<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة الرئيسية</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #12001a;
    color: white;
}

.center-buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.btn {
    margin: 10px;
    padding: 15px;
    width: 180px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
    font-size: 16px;
}

.blue {
    background: #2196f3;
}

.btn:active {
    transform: scale(0.9);
}

/* صورة الخريطة */
img {
    width: 220px;
    height: 220px;
    border-radius: 12px;
    margin: 20px 0;
    object-fit: cover;
}

/* زر اللغة */
.lang-btn {
    width: 60px;
    height: 60px;
    border-radius: 10px;
    border: none;
    background: #4caf50;
    color: white;
    cursor: pointer;
    font-size: 18px;
}

/* قائمة اللغات */
.lang-menu {
    position: absolute;
    bottom: 80px;
    background: #222;
    padding: 10px;
    border-radius: 10px;
    display: none;
    flex-direction: column;
}

.lang-item {
    padding: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
}

.lang-item:hover {
    background: #444;
}
</style>
</head>

<body>

<div class="center-buttons">
    <button class="btn blue" id="loginBtn" onclick="goLogin()">Login</button>
    <button class="btn blue" id="signinBtn">Sign in</button>
</div>

<!-- صورة الخريطة -->
<img src="https://upload.wikimedia.org/wikipedia/commons/8/88/World_map_blank_without_borders.svg">

<!-- زر اللغة -->
<div style="position:relative;">
    <button class="lang-btn" onclick="toggleLangMenu()">🌐</button>

    <div class="lang-menu" id="langMenu">
        <div class="lang-item" onclick="setLang('ar')">🇸🇦 العربية</div>
        <div class="lang-item" onclick="setLang('en')">🇬🇧 English</div>
        <div class="lang-item" onclick="setLang('fr')">🇫🇷 Français</div>
        <div class="lang-item" onclick="setLang('ru')">🇷🇺 Русский</div>
        <div class="lang-item" onclick="setLang('es')">🇪🇸 Español</div>
    </div>
</div>

<script>
function goLogin(){
    window.location.href = "login.html";
}

/* فتح/إغلاق القائمة */
function toggleLangMenu(){
    let menu = document.getElementById("langMenu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

/* تغيير اللغة */
function setLang(lang){
    localStorage.setItem("lang", lang);
    applyLang(lang);
    document.getElementById("langMenu").style.display = "none";
}

/* تطبيق اللغة */
function applyLang(lang){
    let loginBtn = document.getElementById("loginBtn");
    let signinBtn = document.getElementById("signinBtn");

    if(lang === "ar"){
        loginBtn.innerText = "تسجيل الدخول";
        signinBtn.innerText = "حساب جديد";
    }

    if(lang === "en"){
        loginBtn.innerText = "Login";
        signinBtn.innerText = "Sign up";
    }

    if(lang === "fr"){
        loginBtn.innerText = "Connexion";
        signinBtn.innerText = "Créer compte";
    }

    if(lang === "ru"){
        loginBtn.innerText = "Войти";
        signinBtn.innerText = "Регистрация";
    }

    if(lang === "es"){
        loginBtn.innerText = "Iniciar sesión";
        signinBtn.innerText = "Registrarse";
    }
}

/* تحميل اللغة */
window.onload = function(){
    let lang = localStorage.getItem("lang") || "ar";
    applyLang(lang);
}

/* إغلاق القائمة عند الضغط خارجها */
document.addEventListener("click", function(e){
    let menu = document.getElementById("langMenu");
    let btn = document.querySelector(".lang-btn");

    if(!menu.contains(e.target) && !btn.contains(e.target)){
        menu.style.display = "none";
    }
});
</script>

</body>
</html>
