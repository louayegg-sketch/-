<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>page</title>

<style>
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f0c29,#3a0ca3,#7209b7);
    color:white;
}

.btn{
    margin:10px;
    padding:15px;
    width:180px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
}

.blue{
    background:#2196f3;
}

img{
    width:220px;
    height:220px;
    border-radius:12px;
    margin:20px 0;
    object-fit:cover;
}

.lang-btn{
    width:60px;
    height:60px;
    border:none;
    border-radius:10px;
    background:#4caf50;
    color:white;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<button class="btn blue" id="loginBtn">تسجيل الدخول</button>
<button class="btn blue" id="signinBtn">حساب جديد</button>

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/World_map_-_low_resolution.svg/1024px-World_map_-_low_resolution.svg.png">

<button class="lang-btn" onclick="langComingSoon()">🌐</button>

<script>
// تشغيل الأزرار
document.getElementById("loginBtn").onclick = function(){
    window.location.href = "login.html";
};

document.getElementById("signinBtn").onclick = function(){
    alert("صفحة التسجيل تحت التطوير");
};

function langComingSoon(){
    alert("ميزة تغيير اللغة تحت الإنشاء 🚧");
}
</script>

</body>
</html>
