<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة الثانية</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f0c29, #3a0ca3, #7209b7);
    color: white;
}

.center-buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.btn {
    margin: 10px;
    padding: 15px;
    width: 160px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
    font-size: 16px;
}

.btn:active {
    transform: scale(0.9);
}

.blue {
    background: #2196f3;
}

.green {
    background: #4caf50;
}

img {
    width: 220px;
    height: 220px;
    border-radius: 12px;
    margin: 20px 0;
    object-fit: cover;
}

.lang-btn {
    width: 60px;
    height: 60px;
    border-radius: 10px;
    border: none;
    background: #4caf50;
    color: white;
    cursor: pointer;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="center-buttons">
    <button class="btn blue" onclick="goLogin()">تسجيل الدخول</button>
    <button class="btn blue">حساب جديد</button>
</div>

<!-- صورة الخريطة -->
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/World_map_-_low_resolution.svg/1024px-World_map_-_low_resolution.svg.png">

<!-- زر اللغة -->
<button class="lang-btn" onclick="langComingSoon()">🌐</button>

<script>
function goLogin(){
    window.location.href = "login.html";
}

function langComingSoon(){
    alert("ميزة تغيير اللغة تحت الإنشاء 🚧");
}
</script>

</body>
</html>
