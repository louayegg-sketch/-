<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة الرئيسية</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #12001a;
    color: white;
}

/* الأزرار */
.btn {
    margin: 10px;
    padding: 15px;
    width: 180px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
    font-size: 16px;
}

/* أزرق */
.blue {
    background: #2196f3;
}

.btn:active {
    transform: scale(0.9);
}

/* حاوية الأزرار في الوسط */
.center-buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* الصورة */
img {
    width: 220px;
    height: 220px;
    border-radius: 12px;
    margin: 20px 0;
    object-fit: cover;
}

/* زر اللغة */
.lang-btn {
    width: 60px;
    height: 60px;
    border-radius: 10px;
    border: none;
    background: #4caf50;
    color: white;
    cursor: pointer;
    font-size: 14px;
}

/* القائمة */
.lang-menu {
    position: absolute;
    bottom: 80px;
    background: #222;
    padding: 10px;
    border-radius: 10px;
    display: none;
    flex-direction: column;
}

.lang-item {
    padding: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
}

.lang-item:hover {
    background: #444;
}

.flag {
    width: 20px;
}
</style>
</head>

<body>

<div class="center-buttons">
    <button class="btn blue" onclick="goLogin()">Login</button>
    <button class="btn blue">Sign in</button>
</div>

<img src="https://upload.wikimedia.org/wikipedia/commons/8/88/World_map_blank_without_borders.svg" alt="map">

<!-- زر اللغة -->
<div style="position:relative;">
    <button class="lang-btn" onclick="toggleLangMenu()" id="langBtn">🌐</button>

    <div class="lang-menu" id="langMenu">
        <div class="lang-item" onclick="setLang('ar')">🇸🇦 العربية</div>
        <div class="lang-item" onclick="setLang('en')">🇬🇧 English</div>
        <div class="lang-item" onclick="setLang('fr')">🇫🇷 Français</div>
        <div class="lang-item" onclick="setLang('ru')">🇷🇺 Русский</div>
        <div class="lang-item" onclick="setLang('es')">🇪🇸 Español</div>
    </div>
</div>

<script>
function goLogin(){
    window.location.href = "login.html";
}

/* فتح/إغلاق القائمة */
function toggleLangMenu(){
    let menu = document.getElementById("langMenu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

/* اختيار اللغة */
function setLang(lang){
    localStorage.setItem("lang", lang);
    document.getElementById("langMenu").style.display = "none";
}

/* إغلاق القائمة عند الضغط خارجها */
document.addEventListener("click", function(e){
    let menu = document.getElementById("langMenu");
    let btn = document.getElementById("langBtn");

    if(!menu.contains(e.target) && !btn.contains(e.target)){
        menu.style.display = "none";
    }
});
</script>

</body>
</html>
