<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة الثانية</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        /* ✅ نفس خلفية الهوم */
        background: #12001a;

        color: white;
    }

    .btn {
        margin: 10px;
        padding: 15px;
        width: 140px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
        font-size: 16px;
    }

    .btn:active {
        transform: scale(0.9);
    }

    .login {
        background: #2196f3;
    }

    .signin {
        background: #4caf50;
    }

    img {
        width: 200px;
        height: 200px;
        border-radius: 10px;
        margin: 20px 0;
    }

    .lang {
        background: #ff9800;
    }
</style>
</head>

<body>

<div>
    <button class="btn login" onclick="goLogin()">Login</button>
    <button class="btn signin">Sign in</button>
</div>

<img src="https://via.placeholder.com/200" alt="map">

<button class="btn lang">Change Language</button>

<script>
function goLogin(){
    window.location.href = "login.html";
}
</script>

</body>
</html>
