<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة الثانية</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #5f0a87);
    color: white;
}

h1 {
    animation: zoom 2s infinite;
    text-shadow: 0px 4px 10px rgba(0,0,0,0.8);
}

@keyframes zoom {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

.center-buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.btn {
    margin: 10px;
    padding: 15px;
    width: 160px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
    font-size: 16px;
}

.btn:active {
    transform: scale(0.9);
}

.blue {
    background: #2196f3;
}

.green {
    background: #4caf50;
}

img {
    width: 220px;
    height: 220px;
    border-radius: 12px;
    margin: 20px 0;
    object-fit: cover;
}

.lang-btn {
    width: 60px;
    height: 60px;
    border-radius: 10px;
    border: none;
    background: #4caf50;
    color: white;
    cursor: pointer;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>الصفحة الرئيسية</h1>

<div class="center-buttons">
    <button class="btn blue" onclick="goLogin()">تسجيل الدخول</button>
    <button class="btn blue" onclick="signup()">حساب جديد</button>
</div>

<!-- الخريطة -->
<img src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg" alt="map">

<!-- زر اللغة -->
<button class="lang-btn" onclick="langComingSoon()">🌐</button>

<script>
function goLogin(){
    window.location.href = "login.html";
}

function signup(){
    window.location.href = "reg.html";
}

function langComingSoon(){
    alert("ميزة تغيير اللغة تحت الإنشاء 🚧");
}
</script>

</body>
</html>
