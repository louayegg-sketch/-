// ===== اقتراح اسم =====
function similarity(a,b){
  let same = 0;
  for(let i=0;i<Math.min(a.length,b.length);i++){
    if(a[i] === b[i]) same++;
  }
  return same;
}

function getClosestName(input){
  let names = Object.keys(users);
  let best = "";
  let bestScore = 0;

  names.forEach(name=>{
    let score = similarity(input, name);
    if(score > bestScore){
      bestScore = score;
      best = name;
    }
  });

  return best;
}

// ===== تسجيل الدخول =====
function login(){
  let u = document.getElementById("username").value.trim();
  let p = document.getElementById("password").value;

  let error = document.getElementById("error");
  let suggest = document.getElementById("suggest");

  if(!users[u]){
    let close = getClosestName(u);
    error.innerHTML = "❌ الاسم مش موجود (تأكد تحذف المسافات)";
    suggest.innerHTML = close ? "هل تقصد: " + close : "";
    return;
  }

  if(users[u].password !== p){
    error.innerHTML = "❌ كلمة السر ليست صحيحة";
    suggest.innerHTML = `<span class="link" onclick="signinPage()">هل نسيت كلمة السر؟</span>`;
    return;
  }

  mainPage();
}
