<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>شحن فلوس خريطة الميمز</title>

<style>
body{
text-align:center;
font-family:Arial;
background:#0f172a;
color:white;
margin-top:50px;
display:flex;
flex-direction:column;
align-items:center;
}

h1{
font-size:28px;
margin-bottom:20px;
text-align:center;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
margin:10px;
}

input{
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
margin:10px;
text-align:center;
}

.blue{background:#2196F3;color:white;}
.green{background:#22c55e;color:white;}
.option{background:#334155;color:white;}

img{
max-width:200px;
margin:10px;
}
</style>
</head>
<body>

<!-- صور خرائط وفلوس -->
<img src="https://i.imgur.com/YwJrXlG.png" alt="خريطة">
<img src="https://i.imgur.com/1y0x5KD.png" alt="فلوس">

<h1>شحن فلوس خريطة الميمز مجانا</h1>

<div id="content">
<button class="blue" onclick="start()">شحن الآن!</button>
</div>

<!-- أصوات -->
<audio id="clickSound">
  <source src="https://www.soundjay.com/button/beep-07.mp3" type="audio/mpeg">
</audio>
<audio id="successSound">
  <source src="https://www.soundjay.com/button/button-3.mp3" type="audio/mpeg">
</audio>

<script>
function playClick(){
  document.getElementById('clickSound').play();
}

function playSuccess(){
  document.getElementById('successSound').play();
}

function start(){
  playClick();
  document.getElementById("content").innerHTML =
  "<p id='wait'>انتظر 10 ثواني...</p>";

  let time = 10;
  let timer = setInterval(function(){
    time--;
    document.getElementById("wait").innerText = "انتظر " + time + " ثواني...";
    if(time <= 0){
      clearInterval(timer);
      playSuccess();
      document.getElementById("content").innerHTML =
      "<button class='green' onclick='options()'>الشحن</button>";
    }
  },1000);
}

function options(){
  playClick();
  document.getElementById("content").innerHTML = `
  <p>اختر الكمية</p>
  <button class="option" onclick="askName()">500$</button>
  <button class="option" onclick="askName()">1000$</button>
  <button class="option" onclick="askName()">5000$</button>
  <button class="option" onclick="askName()">10000$</button>
  `;
}

function askName(){
  playClick();
  document.getElementById("content").innerHTML = `
  <p>اكتب اسمك</p>
  <input id="name" placeholder="اسمك">
  <br>
  <button class="green" onclick="openVideo()">تأكيد</button>
  `;
}

function openVideo(){
  playClick();
  let name = document.getElementById("name").value;
  if(name == ""){
    alert("اكتب اسمك أولاً");
    return;
  }
  window.open("https://youtube.com/@mn98ty?si=uZyvytkJI9K9T9Yj");
  document.getElementById("content").innerHTML = `
  <p>ارجع بعد مشاهدة الفيديو</p>
  <button class="green" onclick="done('${name}')">رجعت</button>
  `;
}

function done(name){
  playSuccess();
  alert("تم تسجيل الطلب باسم " + name + " ✅\nسوف تصلك الفلوس بعد 24 ساعة");
}
</script>

</body>
</html>
