<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خريطة الميمز</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: white;

        /* ✅ نفس خلفية الهوم */
        background: #12001a;
    }

    .container {
        padding: 20px;
    }

    h1 {
        font-size: 24px;
        animation: zoom 2s infinite;
        text-shadow: 0px 4px 10px rgba(0,0,0,0.8);
    }

    @keyframes zoom {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
    }

    button {
        margin-top: 20px;
        width: 120px;
        height: 120px;
        font-size: 18px;
        border-radius: 30px;
        border: 2px solid yellow;
        background: #00a844;
        color: white;
        cursor: pointer;
        transition: 0.15s;
    }

    button:active {
        transform: scale(0.85);
        background: #008f39;
    }

    @media (max-width: 600px) {
        h1 {
            font-size: 20px;
        }

        button {
            width: 100px;
            height: 100px;
            font-size: 16px;
        }
    }
</style>

</head>
<body>

<div class="container">
    <h1>مرحبا بك في خريطة الميمز! 😂</h1>
    <button onclick="start()">ابدأ</button>
</div>

<script>
function start() {
    window.location.href = "page.html";
}
</script>

</body>
</html>
