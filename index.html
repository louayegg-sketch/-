<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خريطة الميمز</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: white;

        /* الخلفية أزرق + بنفسجي */
        background: linear-gradient(135deg, #1e3c72, #8e2de2);
    }

    .container {
        padding: 20px;
    }

    h1 {
        font-size: 24px;
        animation: zoom 2s infinite;
    }

    /* انميشن الزوم */
    @keyframes zoom {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
    }

    button {
        margin-top: 20px;
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 12px;
        background: #00c853;
        color: white;
        cursor: pointer;
        transition: 0.2s;
    }

    /* انميشن الضغط */
    button:active {
        transform: scale(0.9);
        background: #00a844;
    }

    /* تحسين للجوال */
    @media (max-width: 600px) {
        h1 {
            font-size: 20px;
        }

        button {
            width: 80%;
            font-size: 16px;
        }
    }
</style>

</head>
<body>

<div class="container">
    <h1>مرحبا بك في خريطة الميمز! 😂</h1>
    <button onclick="start()">ابدأ</button>
</div>

<script>
    function start() {
        alert("جاهز للدخول 🔥");
    }
</script>

</body>
</html>
