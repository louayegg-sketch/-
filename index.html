<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme Map</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#1f1c2c,#928dab);
  color:white;
  text-align:center;
}

.card{
  width:300px;
  margin:80px auto;
  padding:20px;
  border-radius:15px;
  background:rgba(0,0,0,0.6);
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.green{background:#28a745;color:white;}
.blue{background:#007bff;color:white;}

input{
  width:85%;
  padding:10px;
  margin:6px;
  border-radius:6px;
  border:2px solid black;
}

.error{
  color:red;
  font-size:14px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
let users = [{name:"admin", password:"1234"}];
let lang = "ar";

/* ================= TEXT ================= */
const T = {
 ar:{
  welcome:"مرحبا بك",
  login:"تسجيل الدخول",
  signup:"إنشاء حساب",
  username:"الاسم",
  password:"كلمة السر",
  start:"البدء",
  wrongUser:"❌ الاسم غير موجود",
  wrongPass:"❌ كلمة السر خاطئة"
 }
};

function t(key){ return T[lang][key]; }

/* ================= RENDER ================= */
function render(html){
 document.getElementById("app").innerHTML = html;
}

/* ================= WELCOME ================= */
function welcome(){
 render(`
  <div class="card">
    <h2>${t("welcome")}</h2>
    <button class="green" onclick="loginPage()">${t("start")}</button>
  </div>
 `);
}

/* ================= LOGIN ================= */
function loginPage(){
 render(`
  <div class="card">
    <h2>${t("login")}</h2>

    <input id="u" placeholder="${t("username")}">
    <input id="p" type="password" placeholder="${t("password")}">

    <div id="err" class="error"></div>

    <button class="blue" onclick="login()">Login</button>
    <button class="green" onclick="signupPage()">${t("signup")}</button>
  </div>
 `);
}

/* ================= SIGNUP ================= */
function signupPage(){
 render(`
  <div class="card">
    <h2>${t("signup")}</h2>

    <input id="nu" placeholder="${t("username")}">
    <input id="np" type="password" placeholder="${t("password")}">

    <button class="blue" onclick="create()">Create</button>
    <button onclick="loginPage()">Back</button>
  </div>
 `);
}

function create(){
 let u=document.getElementById("nu").value;
 let p=document.getElementById("np").value;
 users.push({name:u,password:p});
 loginPage();
}

/* ================= LOGIN CHECK ================= */
function login(){
 let u=document.getElementById("u").value.trim();
 let p=document.getElementById("p").value;
 let err=document.getElementById("err");

 let user=users.find(x=>x.name===u);

 if(!user){
   err.innerText = t("wrongUser");
   return;
 }

 if(user.password!==p){
   err.innerText = t("wrongPass");
   return;
 }

 mainPage();
}

/* ================= MAIN ================= */
function mainPage(){
 render(`
  <div class="card">
    <h2>${t("welcome")}</h2>

    <img src="https://i.ibb.co/RpPJkLDX/map.png" style="width:100%;border-radius:10px">

    <br><br>
    <button class="blue" onclick="loginPage()">Logout</button>
  </div>
 `);
}

/* ================= START ================= */
welcome();
</script>

</body>
</html>
