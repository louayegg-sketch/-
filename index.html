<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>خريطة الميمز</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial, sans-serif; text-align:center; margin:0; padding:20px; background: linear-gradient(135deg, #1f1c2c, #928dab); color:black; }
button.main-btn, button.login-btn { cursor:pointer; }
button.main-btn { padding:20px 40px; margin:10px; border:none; border-radius:30px; background:#00c3ff; color:white; font-size:20px; }
button.login-btn { padding:18px 35px; border:none; border-radius:25px; background:#00c3ff; color:white; font-size:18px; margin-top:15px; }
input { padding:15px; margin:15px 0; border-radius:25px; border:none; width:80%; font-size:18px; display:block; margin-left:auto; margin-right:auto; }
#content { margin-top:20px; text-align:center; }
#error { color:red; font-weight:bold; }
.user-box { background:white; color:black; border-radius:15px; padding:20px; margin:20px auto; max-width:90%; box-shadow: 0 0 20px rgba(0,0,0,0.3); text-align:right; }
#map-img { max-width:90%; height:auto; border-radius:15px; margin:20px auto; display:block; }
#lang-btn { background:#28a745; color:white; padding:10px 20px; border:none; border-radius:15px; cursor:pointer; margin-bottom:10px; }
#lang-list { display:none; margin-bottom:20px; }
#lang-list button { margin:5px; padding:8px 15px; border:none; border-radius:12px; cursor:pointer; background:#28a745; color:white; }
#loading { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); border:8px solid #f3f3f3; border-top:8px solid #00c3ff; border-radius:50%; width:60px; height:60px; animation: spin 1s linear infinite; z-index:1000; }
@keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
#home-btn { position:fixed; top:15px; right:15px; padding:10px 15px; border-radius:15px; background:#00c3ff; color:white; border:none; cursor:pointer; z-index:1000; }
</style>
</head>
<body>

<div id="loading"></div>
<button id="home-btn" onclick="goHome()">🏠</button>

<div id="home">
  <button class="main-btn" onclick="showLogin()">🔐 تسجيل الدخول</button>
  <button class="main-btn" onclick="showSignIn()">📝 تسجيل جديد</button>
  <img id="map-img" src="https://i.ibb.co/RpPJkLDX/map.png" alt="خريطة الميمز">
  <div>
    <button id="lang-btn" onclick="toggleLangList()">تغيير اللغة</button>
    <div id="lang-list">
      <button onclick="changeLang('ar')">العربية</button>
      <button onclick="changeLang('en')">English</button>
      <button onclick="changeLang('fr')">Français</button>
      <button onclick="changeLang('ru')">Русский</button>
      <button onclick="changeLang('es')">Español</button>
    </div>
  </div>
</div>

<div id="content"></div>

<script>
// بيانات كل المستخدمين (أضفت أسماء قليلة كمثال، تضيف بقية الأسماء بالطريقة نفسها)
const users = {
  "لؤي": { password:"49520", الجنود:13200, العسكري:2, الاقتصاد:"9908$", المنتخب:4, "الة نفط":"1", "الة استخراج الحديد":"1", "نووي":"78", "التخفي":"نعم" },
  "حماد": { password:"46238", الجنود:340, العسكري:1, الاقتصاد:"50$", المنتخب:1, "الة نفط":"1" },
  "ناصر": { password:"30517", الجنود:90, العسكري:1, الاقتصاد:"100$", المنتخب:1 },
  "مؤمنة": { password:"71826", الجنود:200, العسكري:1, الاقتصاد:"80$", المنتخب:1 },
  "بدر": { password:"38217", الجنود:1070, العسكري:1, الاقتصاد:"126$", المنتخب:1, "صاروخ طراز 5":"1" },
  "سبونر": { password:"12345", الجنود:650, العسكري:1, الاقتصاد:"100$", المنتخب:1 } 
  // تضيف باقي الأشخاص بنفس التنسيق مع كلمة السر لكل شخص
};

// دوال
function normalize(str){ return str.trim().toLowerCase(); }

const translations = {
  "ar": { login:"تسجيل الدخول", signIn:"تسجيل جديد", username:"اسمك", password:"كلمة السر", errorName:"❌ الاسم غير موجود", errorPass:"❌ كلمة السر غير صحيحة", note:"⚠️ ملاحظة: معلومات الآلات ليست دقيقة 100٪!", strength:"القوة الكلية", contact:"لازم ترسل لصاحب الخريطة فالخاص فالانستا 📩 @Louaye_Gamer_i وهو يعطيك كلمة السر عشان تدخل حسابك", militaryRank:"المركز العالمي العسكري" },
  "en": { login:"Login", signIn:"Sign In", username:"Username", password:"Password", errorName:"❌ Name not found", errorPass:"❌ Incorrect password", note:"⚠️ Note: Equipment info not 100% accurate!", strength:"Total strength", contact:"You must contact the map owner via Instagram 📩 @Louaye_Gamer_i to get your password", militaryRank:"Global Military Rank" }
};

let currentLang = "ar";
function toggleLangList(){ const list=document.getElementById("lang-list"); list.style.display=list.style.display==='none'?'block':'none'; }
function getRandomLoadingTime(){ return Math.random()*2.5+0.5; }
function showLoading(callback){ const loading=document.getElementById("loading"); loading.style.display="block"; const duration=getRandomLoadingTime()*1000; setTimeout(()=>{ loading.style.display="none"; if(callback) callback(); },duration); }
function changeLang(lang){ showLoading(()=>{ currentLang=lang; document.querySelectorAll(".main-btn")[0].innerText=translations[lang].login; document.querySelectorAll(".main-btn")[1].innerText=translations[lang].signIn; updateHomeBtnPosition(); }); }
function showLogin(){ showLoading(()=>{ document.getElementById("home").style.display="none"; document.getElementById("content").innerHTML = `<h2>${translations[currentLang].login}</h2><input id="username" placeholder="${translations[currentLang].username}"><input id="password" type="password" placeholder="${translations[currentLang].password}"><button class="login-btn" onclick="login()">${translations[currentLang].login}</button><p id="error"></p>`; }); }
function showSignIn(){ document.getElementById("home").style.display="none"; document.getElementById("content").innerHTML = `<div style="color:black; font-weight:bold; text-align:center;"><h2>${translations[currentLang].signIn}</h2><p>${translations[currentLang].contact}</p><a href="https://instagram.com/Louaye_Gamer_i" target="_blank"><button class="login-btn">📷 تواصل على انستغرام</button></a></div>`; }
function login(){ showLoading(()=>{ let inputUser=normalize(document.getElementById("username").value); let inputPass=document.getElementById("password").value.trim(); let error=document.getElementById("error"); let foundUser=null; for(const key in users){ if(normalize(key)===inputUser){ foundUser=key; break; } } if(!foundUser){ error.innerText=translations[currentLang].errorName; return; } if(users[foundUser].password!==inputPass){ error.innerText=translations[currentLang].errorPass; return; } let u=users[foundUser]; let strength=(u.العسكري||0)*(u.الجنود||0); const allUsers=Object.values(users).map(user=>(user.العسكري||0)*(user.الجنود||0)).sort((a,b)=>b-a); let rank=allUsers.indexOf(strength)+1; let display=`<div class="user-box"><strong>${translations[currentLang].note}</strong><br><br>`; display+=`👤 الاسم: ${foundUser}<br>`; display+=`• ${translations[currentLang].strength}: ${strength}<br>`; display+=`• ${translations[currentLang].militaryRank}: ${rank}<br>`; for(const key in u){ if(key!=="password") display+=`• ${key}: ${u[key]}<br>`; } display+=`</div>`; document.getElementById("content").innerHTML=display; }); }
function goHome(){ const loading=document.getElementById("loading"); loading.style.display="block"; setTimeout(()=>{ loading.style.display="none"; document.getElementById("home").style.display="block"; document.getElementById("content").innerHTML=""; updateHomeBtnPosition(); },500); }
function updateHomeBtnPosition(){ const btn=document.getElementById("home-btn"); if(currentLang==="ar"){ btn.style.right="15px"; btn.style.left="unset"; } else { btn.style.left="15px"; btn.style.right="unset"; } }
updateHomeBtnPosition();
</script>
</body>
</html>
