<meta charset="UTF-8">
<title>خريطة الميمز التفاعلية</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial, sans-serif; text-align:center; margin:0; padding:20px; background: linear-gradient(135deg,#1f1c2c,#928dab); color:black; }
button { cursor:pointer; transition: transform 0.2s ease; }
button:active { transform: scale(0.95); }
button.main-btn { padding:20px 40px; margin:10px; border:none; border-radius:30px; background:#00c3ff; color:white; font-size:20px; }
button.login-btn { padding:18px 35px; border:none; border-radius:25px; background:#00c3ff; color:white; font-size:18px; margin-top:15px; }
input { padding:15px; margin:15px 0; border-radius:25px; border:none; width:80%; font-size:18px; display:block; margin-left:auto; margin-right:auto; }
#content { margin-top:20px; text-align:center; }
#error { color:red; font-weight:bold; }
.user-box { background:white; color:black; border-radius:15px; padding:20px; margin:20px auto; max-width:90%; box-shadow:0 0 20px rgba(0,0,0,0.3); text-align:right; opacity:0; transform:translateY(20px); transition:all 0.5s ease-in-out; }
#map-img { max-width:90%; height:auto; border-radius:15px; margin:20px auto; display:block; }
#lang-btn { background:#28a745; color:white; padding:10px 20px; border:none; border-radius:15px; cursor:pointer; margin-bottom:10px; }
#lang-list { display:none; margin-bottom:20px; }
#lang-list button { margin:5px; padding:8px 15px; border:none; border-radius:12px; cursor:pointer; background:#28a745; color:white; }
#loading { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); border:8px solid #f3f3f3; border-top:8px solid #00c3ff; border-radius:50%; width:60px; height:60px; animation: spin 1s linear infinite; z-index:1000; }
@keyframes spin { 0% { transform:translate(-50%,-50%) rotate(0deg); } 100% { transform:translate(-50%,-50%) rotate(360deg); } }
#home-btn { position:fixed; top:15px; right:15px; padding:10px 15px; border-radius:15px; background:#00c3ff; color:white; border:none; cursor:pointer; z-index:1000; }
</style>
</head>
<body>

<audio id="click-sound" src="click.mp3"></audio>
<div id="loading"></div>
<button id="home-btn" onclick="goHome()">🏠</button>

<div id="home">
  <button class="main-btn" onclick="playSound(); showLogin()">🔐 تسجيل الدخول</button>

  <img id="map-img" src="https://i.ibb.co/RpPJkLDX/map.png" alt="خريطة الميمز">

  <p style="color:white; font-size:14px; margin-top:10px;">
    اشترك فقناتة لؤي (<a href="https://www.youtube.com/@MN98Ty" target="_blank" style="color:#3498db; text-decoration:none;">اشتراك</a>)
  </p>

  <div>
    <button id="lang-btn" onclick="toggleLangList()">تغيير اللغة</button>
    <div id="lang-list">
      <button onclick="changeLang('ar')">العربية</button>
      <button onclick="changeLang('en')">English</button>
      <button onclick="changeLang('fr')">Français</button>
      <button onclick="changeLang('ru')">Русский</button>
      <button onclick="changeLang('es')">Español</button>
    </div>
  </div>
</div>

<div id="content"></div>

<script>
function playSound(){ const s=document.getElementById("click-sound"); s.currentTime=0; s.play(); }
function showLoading(callback){
  const loading=document.getElementById("loading");
  loading.style.display="block";
  let delay=Math.random()*2000+1000;
  setTimeout(()=>{ loading.style.display="none"; callback(); }, delay);
}
function goHome(){ document.getElementById("home").style.display="block"; document.getElementById("content").innerHTML=""; }
function toggleLangList(){ let l=document.getElementById("lang-list"); l.style.display = (l.style.display==="none")?"block":"none"; }
function changeLang(lang){ showLoading(()=>alert("تم تغيير اللغة لـ "+lang)); }

function showLogin(){
  document.getElementById("home").style.display="none";
  document.getElementById("content").innerHTML=`
  <input type="text" id="username" placeholder="أدخل الاسم">
  <input type="password" id="password" placeholder="كلمة السر (5 أرقام)">
  <button class="login-btn" onclick="login()">تسجيل دخول</button>
  <p id="error"></p>`;
}

function login(){
  let u=document.getElementById("username").value;
  let p=document.getElementById("password").value;
  if(users[u] && users[u].password===p){
    showLoading(()=>showUserInfo(u));
  } else {
    document.getElementById("error").textContent="الاسم أو كلمة السر خاطئة!";
  }
}

function showUserInfo(user){
  let info=users[user];
  let html=`<div class="user-box">`;
  for(let key in info){
    if(key!=="password"){
      html+=`<p><strong>${key}:</strong> ${info[key]}</p>`;
    }
  }
  html+=`</div>`;
  document.getElementById("content").innerHTML=html;
}
