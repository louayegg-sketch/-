<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خريطة الميمز</title>

<style>
body {
  margin:0;
  font-family: Arial;
  text-align:center;
  background: linear-gradient(135deg, #1f1c2c, #4b3f72, #928dab);
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

button {
  padding:12px 20px;
  margin:8px;
  border:none;
  border-radius:15px;
  font-size:15px;
  cursor:pointer;
}

.blue { background:#007bff; color:white; }
.green { background:#28a745; color:white; }

input {
  padding:10px;
  margin:8px;
  width:80%;
  max-width:300px;
  border-radius:12px;
  border:none;
}

.link { color:#00c3ff; cursor:pointer; }

#langMenu {
  display:none;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

const users = {
  // المستخدمين عندك
};

let historyStack = [];

function savePage(fn){ historyStack.push(fn); }

function goBack(){
  historyStack.pop();
  let last = historyStack.pop();
  if(last) last();
}

// ===== عرض الصفحة مباشرة =====
function init(){
  document.getElementById("app").innerHTML = `
    
    <button class="blue" onclick="loginForm()">Login</button>
    <button class="blue" onclick="signinPage()">Sign In</button>

    <br>

    <img src="https://i.ibb.co/RpPJkLDX/map.png" style="width:80%;max-width:350px;margin-top:10px;">

    <br>

    <button onclick="toggleLang()">🌐 تغيير اللغة</button>

    <div id="langMenu">
      <button>عربي</button>
      <button>English</button>
      <button>Español</button>
      <button>Русский</button>
      <button>Français</button>
    </div>

    <br>

    <p class="link" onclick="openYT()">اشترك في قناة لؤي</p>

  `;
}

// ===== تسجيل الدخول =====
function loginForm(){
  document.getElementById("app").innerHTML = `
    <input id="username" placeholder="اكتب الاسم">
    <input id="password" type="password" placeholder="كلمة السر">
    <button class="blue" onclick="login()">دخول</button>
    <p id="error" style="color:red;"></p>
    <p id="suggest"></p>
  `;
}

function signinPage(){
  document.getElementById("app").innerHTML = `
    <p>اذا تبغا تسوي حساب جديد تواصل مع صاحب الخريطة لؤي فالانستا</p>
    <p class="link" onclick="openInsta()">@Louaye_Gamer_i</p>
  `;
}

// ===== لغة =====
function toggleLang(){
  let m=document.getElementById("langMenu");
  m.style.display = m.style.display==="block"?"none":"block";
}

// ===== روابط =====
function openYT(){
  window.open("https://www.youtube.com/@MN98Ty","_blank");
}

function openInsta(){
  window.open("https://instagram.com/Louaye_Gamer_i","_blank");
}

// ===== تشغيل =====
init();

</script>

</body>
</html>
