// عرض تسجيل الدخول
function showLogin(){
  document.getElementById("home").style.display = "none";
  document.getElementById("content").innerHTML = `
    <h2>تسجيل الدخول</h2>
    <input id="username" placeholder="اسمك">
    <input id="password" type="password" placeholder="كلمة السر">
    <button class="login-btn" onclick="login()">دخول</button>
    <p id="error"></p>
  `;
}

// عرض التسجيل (Sign In)
function showSignIn(){
  document.getElementById("home").style.display = "none";
  document.getElementById("content").innerHTML = `
    <div style="color:black; font-weight:bold; text-align:center;">
      <h2>التسجيل</h2>
      <p>لازم ترسل لصاحب الخريطة فالخاص فالانستا 📩<br>

      </a>
    </div>
  `;
}

// تسجيل الدخول
function login(){
  let user = document.getElementById("username").value.trim();
  let pass = document.getElementById("password").value.trim();
  let error = document.getElementById("error");

  if(!user){ error.innerText="⚠️ ادخل الاسم"; return; }
  if(!pass){ error.innerText="⚠️ ادخل كلمة السر"; return; }
  if(!users[user]){ error.innerText="❌ الاسم غير موجود"; return; }
  if(users[user].password !== pass){ error.innerText="❌ كلمة السر غير صحيحة"; return; }

  let u = users[user];
  let strength = (u.العسكري||0) * (u.الجنود||0);
  let display = `<strong>⚠️ ملاحظة: معلومات الآلات ليست دقيقة 100٪!</strong><br><br>`;
  display += `👤 الاسم: ${user}<br>`;
  display += `• القوة الكلية: ${strength}<br>`;
  for(const key in u){
    if(key!=="password") display += `• ${key}: ${u[key]}<br>`;
  }
  document.getElementById("content").innerHTML = display;
}
