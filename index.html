<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>خريطة الميمز</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial, sans-serif;
  text-align:center;
  margin:0;
  padding:20px;
  color:white;
  /* الخلفية الأصلية من أول نسخة */
  background: linear-gradient(135deg, #1f1c2c, #928dab);
  background-image:
    linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.05) 75%),
    linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.05) 75%);
  background-size: 50px 50px;
  background-position: 0 0, 0 25px, 25px -25px, -25px 0px;
}
button.main-btn {
  padding:20px 40px;
  margin:10px;
  border:none;
  border-radius:30px;
  background:#00c3ff;
  color:white;
  font-size:20px;
  cursor:pointer;
  min-width:160px;
}
button.main-btn:hover {
  transform: scale(1.05);
  transition: 0.2s;
}
button.login-btn {
  padding:18px 35px;
  border:none;
  border-radius:25px;
  background:#00c3ff;
  color:white;
  font-size:18px;
  cursor:pointer;
  margin-top:15px;
  box-shadow: 0 5px 15px rgba(0,195,255,0.5);
}
input {
  padding:15px;
  margin:15px 0;
  border-radius:25px;
  border:none;
  width:80%;
  font-size:18px;
  display:block;
  margin-left:auto;
  margin-right:auto;
  box-shadow: 0 0 15px rgba(0,195,255,0.3);
}
img.map {
  width:100%;
  max-width:600px;
  height:auto;
  border-radius:15px;
  margin:20px 0;
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
}
#content {
  margin-top:20px;
  text-align:center;
}
</style>
</head>
<body>

<div id="home">
  <button class="main-btn" onclick="showLogin()">🔐 تسجيل الدخول</button>
  <button class="main-btn" onclick="showSignIn()">📝 تسجيل جديد</button>
  <img class="map" src="https://i.ibb.co/RpPJkLDX/map.jpg" alt="خريطة الميمز">
</div>

<div id="content"></div>

<script>
// بيانات المستخدمين
const users = {
  "لؤي": { password:"49520", الجنود:13200, العسكري:2, الاقتصاد:"9908$", المنتخب:4 },
  "سانتش": { password:"00001", الجنود:37700, العسكري:1, الاقتصاد:"100$", المنتخب:1 },
  "عبدو": { password:"00002", الجنود:11500, العسكري:1, الاقتصاد:"100$", المنتخب:1 },
  "الوليد": { password:"58241", الجنود:11500, العسكري:1, الاقتصاد:"100$", المنتخب:1 },
  "ماهر": { password:"19384", الجنود:5625, العسكري:1, الاقتصاد:"120$", المنتخب:1 },
};

// عرض تسجيل الدخول
function showLogin(){
  document.getElementById("home").style.display = "none";
  document.getElementById("content").innerHTML = `
    <h2>تسجيل الدخول</h2>
    <input id="username" placeholder="اسمك">
    <input id="password" type="password" placeholder="كلمة السر">
    <button class="login-btn" onclick="login()">دخول</button>
    <p id="result"></p>
  `;
}

// عرض التسجيل
function showSignIn(){
  document.getElementById("home").style.display = "none";
  document.getElementById("content").innerHTML = `
    <h2>التسجيل</h2>
    <p>لازم ترسل لصاحب الخريطة فالخاص فالانستا 📩<br>وهو يعطيك كلمة السر عشان تدخل حسابك</p>
    <a href="https://instagram.com/Louaye_Gamer_i" target="_blank">
      <button class="login-btn">📷 تواصل على انستغرام</button>
    </a>
  `;
}

// تسجيل الدخول
function login(){
  let user = document.getElementById("username").value.trim();
  let pass = document.getElementById("password").value.trim();
  let result = document.getElementById("result");

  if(!user){ 
    result.innerText="⚠️ ادخل الاسم"; 
    result.style.color="red"; 
    return; 
  }
  if(!pass){ 
    result.innerText="⚠️ ادخل كلمة السر"; 
    result.style.color="red"; 
    return; 
  }
  if(!users[user]){ 
    result.innerText="❌ الاسم غير موجود"; 
    result.style.color="red"; 
    return; 
  }
  if(users[user].password !== pass){ 
    result.innerText="❌ كلمة السر غير صحيحة"; 
    result.style.color="red"; 
    return; 
  }

  // عند الدخول الصحيح، نعرض المعلومات
  let u = users[user];
  let strength = (u.العسكري||0) * (u.الجنود||0);
  let display = `<strong>⚠️ ملاحظة: معلومات الآلات ليست دقيقة 100٪!</strong><br><br>`;
  display += `👤 الاسم: ${user}<br>`;
  display += `• القوة الكلية: ${strength}<br>`;
  for(const key in u){
    if(key!=="password") display += `• ${key}: ${u[key]}<br>`;
  }
  document.getElementById("content").innerHTML = display;
}
</script>

</body>
</html>
