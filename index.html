<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<title>خريطة المستخدمين الكاملة</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial, sans-serif; text-align:center; margin:0; padding:20px; background:#f0f0f0; color:black; }
button { cursor:pointer; padding:15px 30px; margin:10px; border:none; border-radius:25px; background:#00c3ff; color:white; font-size:18px; }
input { padding:12px; margin:12px 0; border-radius:20px; border:1px solid #ccc; width:80%; font-size:16px; display:block; margin-left:auto; margin-right:auto; }
.user-box { background:white; color:black; border-radius:15px; padding:15px; margin:15px auto; max-width:90%; box-shadow:0 0 10px rgba(0,0,0,0.2); text-align:right; }
#map-img { max-width:90%; height:auto; border-radius:10px; margin:20px auto; display:block; }
</style>
</head>
<body>
<h2>خريطة المستخدمين الكاملة</h2>
<button id="login-btn">🔐 تسجيل الدخول</button>
<button id="signin-btn">📝 إنشاء حساب</button>
<img id="map-img" src="https://i.ibb.co/RpPJkLDX/map.png" alt="خريطة المستخدمين">
<div id="content"></div>
<script>
const users = {
  "لؤي": {الجنود:13200, الاقتصاد:"9908$", الديون:"0$", العسكري:2, المركز_العسكري:"2#", لفل_المنتخب:4, نووي:78, التخفي:true, password:"12345"},
  "سانتش": {الجنود:37700, الاقتصاد:"100$", الديون:"0$", العسكري:1, المركز_العسكري:"1#", لفل_المنتخب:1, password:"54321"},
  "رحيم": {الجنود:5000, الاقتصاد:"100$", الديون:"0$", العسكري:1, المركز_العسكري:"7#", لفل_المنتخب:1, password:"67890"},
  "عبدالوهاب": {الجنود:2020, الاقتصاد:"195$", الديون:"0$", العسكري:1, المركز_العسكري:"4#", لفل_المنتخب:3, password:"11223"},
  "عبدو": {الجنود:11500, الاقتصاد:"100$", الديون:"0$", العسكري:1, المركز_العسكري:"3#", لفل_المنتخب:1, password:"44556"},
  "نزار": {الجنود:2450, الاقتصاد:"100$", الديون:"0$", العسكري:1, المركز_العسكري:"6#", لفل_المنتخب:1, password:"77889"},
  "حمود": {الجنود:270, الاقتصاد:"31$", الديون:"0$", العسكري:1, المركز_العسكري:"15#", لفل_المنتخب:1, password:"10101"},
  "عمر": {الجنود:3500, الاقتصاد:"125$", الديون:"0$", العسكري:1, المركز_العسكري:"10#", لفل_المنتخب:1, نووي:1, password:"20202"},
  "علي جواد": {الجنود:820, الاقتصاد:"131$", الديون:"0$", العسكري:1, المركز_العسكري:"12#", لفل_المنتخب:1, password:"30303"},
  "ماهر": {الجنود:5625, الاقتصاد:"120$", الديون:"0$", العسكري:1, المركز_العسكري:"8#", لفل_المنتخب:1, password:"40404"},
  "بدر": {الجنود:1070, الاقتصاد:"126$", الديون:"0$", العسكري:1, المركز_العسكري:"11#", لفل_المنتخب:1, password:"50505"},
  "احمد": {الجنود:1740, الاقتصاد:"100$", الديون:"0$", العسكري:1, المركز_العسكري:"9#", لفل_المنتخب:1, password:"60606"},
  "حماد": {الجنود:340, الاقتصاد:"50$", الديون:"0$", العسكري:1, المركز_العسكري:"14#", لفل_المنتخب:1, password:"70707"},
  "جورنمي": {الجنود:480, الاقتصاد:"24$", الديون:"0$", العسكري:1, المركز_العسكري:"13#", لفل_المنتخب:1, password:"80808"},
  "محمد": {الجنود:130, الاقتصاد:"185$", الديون:"0$", العسكري:1, المركز_العسكري:"16#", لفل_المنتخب:1, password:"90909"},
  "قيس": {الجنود:5500, الاقتصاد:"3700$", الديون:"3$", العسكري:1, المركز_العسكري:"5#", لفل_المنتخب:5, نووي:7, password:"11111"},
  "يونس": {الجنود:10, الاقتصاد:"45$", الديون:"0$", العسكري:1, المركز_العسكري:"20#", لفل_المنتخب:1, password:"22222"},
  "مريم": {الجنود:140, الاقتصاد:"100$", الديون:"0$", العسكري:1, المركز_العسكري:"19#", لفل_المنتخب:1, password:"33333"}
  // ... استمر بإضافة كل المستخدمين الآخرين الأساسيين والثانويين بنفس التنسيق
};function showLogin(){ document.getElementById('content').innerHTML=<input type='text' id='username' placeholder='أدخل الاسم'> <input type='password' id='password' placeholder='كلمة السر (5 أرقام)'> <button id='login-submit'>تسجيل دخول</button> <p id='error'></p>; document.getElementById('login-submit').addEventListener('click', login); }

function showSignIn(){ document.getElementById('content').innerHTML=<input type='text' id='new-username' placeholder='أدخل الاسم الجديد'> <input type='password' id='new-password' placeholder='كلمة السر الجديدة (5 أرقام)'> <button id='signin-submit'>إنشاء حساب</button> <p id='error-signin'></p>; document.getElementById('signin-submit').addEventListener('click', ()=>{ document.getElementById('error-signin').textContent='تم إنشاء الحساب بنجاح (عرض فقط)!'; }); }

function login(){ const u=document.getElementById('username').value; const p=document.getElementById('password').value; if(users[u] && users[u].password===p){ showUserInfo(u); } else { document.getElementById('error').textContent='الاسم أو كلمة السر خاطئة!'; } }

function showUserInfo(u){ const data=users[u]; let html=<div class='user-box'> <h3>${u} - ${data.المركز_العسكري || ''}</h3> <p>الجنود: ${data.الجنود}</p> <p>الاقتصاد: ${data.الاقتصاد}</p> <p>الديون: ${data.الديون || '0$'}</p> <p>العسكري: ${data.العسكري}</p> <p>لفل المنتخب: ${data.لفل_المنتخب}</p> ${data.نووي?<p>نووي: ${data.نووي}</p>:''} ${data.التخفي?<p>التخفي: مفعل</p>`:''}

  </div>`;
  document.getElementById('content').innerHTML=html;
}document.getElementById('login-btn').addEventListener('click', showLogin); document.getElementById('signin-btn').addEventListener('click', showSignIn); </script>

</body>
</html>
