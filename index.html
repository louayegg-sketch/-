<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>خريطة الميمز</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial;
  text-align:center;
  background: linear-gradient(135deg, #1f1c2c, #928dab);
  color:white;
  margin:0;
  padding:20px;
}
button {
  padding:15px 25px;
  margin:10px;
  border:none;
  border-radius:15px;
  background:#00c3ff;
  color:white;
  font-size:18px;
  cursor:pointer;
}
img.map {
  width:100%;
  max-width:600px;
  height:auto;
  border-radius:15px;
  margin:15px 0;
}
</style>
</head>
<body>

<!-- أزرار تسجيل الدخول والتسجيل -->
<div>
  <button onclick="show('login')">🔐 تسجيل الدخول</button>
  <button onclick="show('signin')">📝 تسجيل جديد</button>
</div>

<!-- صورة الخريطة -->
<img class="map" src="https://i.ibb.co/RpPJkLDX/map.jpg" alt="خريطة الميمز">

<!-- زر تحميل الصورة -->
<div>
  <button onclick="downloadMap()">⬇️ تحميل الخريطة</button>
</div>

<!-- تسجيل الدخول -->
<div id="login" style="display:none; margin-top:20px;">
  <h2>تسجيل الدخول</h2>
  <input id="username" placeholder="اسمك"><br><br>
  <input id="password" type="password" placeholder="كلمة السر"><br><br>
  <button onclick="login()">دخول</button>
  <p id="result"></p>
</div>

<!-- التسجيل -->
<div id="signin" style="display:none; margin-top:20px;">
  <h2>التسجيل</h2>
  <p>لازم ترسل لصاحب الخريطة فالخاص فالانستا 📩<br>وهو يعطيك كلمة السر عشان تدخل حسابك</p>
  <a href="https://instagram.com/Louaye_Gamer_i" target="_blank">
    <button>📷 تواصل على انستغرام</button>
  </a>
</div>

<script>
// بيانات المستخدمين بالعربي + كلمة سر
const users = {
  "لؤي": { password:"49520", الجنود:13200, العسكري:2, الاقتصاد:"9908$", المنتخب:4 },
  "سانتش": { password:"00001", الجنود:37700, العسكري:1, الاقتصاد:"100$", المنتخب:1 },
  "عبدو": { password:"00002", الجنود:11500, العسكري:1, الاقتصاد:"100$", المنتخب:1 },
  "الوليد": { password:"58241", الجنود:11500, العسكري:1, الاقتصاد:"100$", المنتخب:1 },
  "ريد تيب": { password:"00003", الجنود:8000, العسكري:1, الاقتصاد:"100$", المنتخب:1 },
  "ماهر": { password:"19384", الجنود:5625, العسكري:1, الاقتصاد:"120$", المنتخب:1 },
  "قيس": { password:"00004", الجنود:5500, العسكري:1, الاقتصاد:"3700$", الديون:3, النفط:5, الحديد:4, الماس:5, الجواز:"18", المنتخب:5, النووي:7 },
};

// عرض وإخفاء login/signin
function show(id){
  document.getElementById("login").style.display = (id==="login")?"block":"none";
  document.getElementById("signin").style.display = (id==="signin")?"block":"none";
}

// تسجيل الدخول
function login(){
  let user = document.getElementById("username").value.trim();
  let pass = document.getElementById("password").value.trim();
  let result = document.getElementById("result");

  if(!user){ result.innerText="⚠️ ادخل الاسم"; return; }
  if(!pass){ result.innerText="⚠️ ادخل كلمة السر"; return; }
  if(!users[user]){ result.innerText="❌ الاسم غير موجود"; return; }
  if(users[user].password !== pass){ result.innerText="❌ كلمة السر غير صحيحة"; return; }

  let u = users[user];
  let strength = (u.العسكري||0) * (u.الجنود||0);
  let display = `⚠️ ملاحظة: معلومات الآلات ليست دقيقة 100٪!\n\n`;
  display += `👤 الاسم: ${user}\n`;
  display += `• القوة الكلية: ${strength}\n`;
  for(const key in u){
    if(key!=="password") display += `• ${key}: ${u[key]}\n`;
  }
  alert(display); // يظهر المعلومات في نافذة منبثقة بسيطة
}

// تحميل الخريطة
function downloadMap() {
  const link = document.createElement('a');
  link.href = 'https://i.ibb.co/RpPJkLDX/map.jpg';
  link.download = 'خريطة الميمز.jpg';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>

</body>
</html>
