// ================= LOGIN =================
function showLogin() {
  document.getElementById("content").innerHTML = `
    <input id="username" placeholder="الاسم">
    <input id="password" type="password" placeholder="كلمة السر">
    <button onclick="login()">دخول</button>
    <p id="error"></p>
  `;
}

function login() {
  let u = document.getElementById("username").value;
  let p = document.getElementById("password").value;

  if (users[u] && users[u].password === p) {
    showUser(u);
  } else {
    document.getElementById("error").innerText = "❌ خطأ في البيانات";
  }
}


// ================= SIGN IN =================
function showSignIn() {
  document.getElementById("content").innerHTML = `
    <input placeholder="اسم جديد">
    <input type="password" placeholder="كلمة سر">
    <button onclick="fakeSign()">إنشاء</button>
    <p id="msg"></p>
  `;
}

function fakeSign() {
  document.getElementById("msg").innerText = "✔️ تم (عرض فقط)";
}


// ================= SHOW USER =================
function showUser(name) {
  let u = users[name];

  let html = `
    <div class="box">
      <h3>${name}</h3>
      <p>الجنود: ${u.الجنود || 0}</p>
      <p>الاقتصاد: ${u.الاقتصاد || 0}</p>
      <p>العسكري: ${u.العسكري || 0}</p>
      <p>لفل المنتخب: ${u.لفل_المنتخب || 0}</p>
    </div>
  `;

  document.getElementById("content").innerHTML = html;
}
