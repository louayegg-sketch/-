<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg, #2b6cff, #8a2be2);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* الكارد */
.card{
  background:#fff;
  padding:20px;
  border-radius:15px;
  width:300px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* العنوان */
.card h2{
  margin-bottom:15px;
}

/* الحقول */
input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:2px solid black;
  outline:none;
}

/* الأزرار */
button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}

/* زر تسجيل الدخول */
.login-btn{
  background:#2b6cff;
  color:white;
}
.login-btn:hover{
  background:#1a4ed8;
}

/* زر إنشاء حساب */
.signup-btn{
  background:#00c853;
  color:white;
}
.signup-btn:hover{
  background:#00a844;
}

/* رسالة الخطأ */
.error-box{
  margin-top:10px;
  color:red;
  font-size:14px;
}

/* رابط نسيت كلمة السر */
.error-box a{
  color:blue;
  cursor:pointer;
  text-decoration:underline;
}

/* أنميشن خفيف */
button:active{
  transform:scale(0.97);
}
</style>
</head>

<body>

<div class="card">

  <h2>🔐 تسجيل الدخول</h2>

  <input id="username" placeholder="الاسم">
  <input id="password" type="password" placeholder="كلمة السر">

  <div id="error" class="error-box"></div>

  <button class="login-btn" onclick="login()">تسجيل الدخول</button>
  <button class="signup-btn" onclick="signupPage()">إنشاء حساب</button>

</div>

<script>
/* 👇 بيانات المستخدمين (انت تضيفهم) */
let users = [
  {name:"louis", password:"1234"},
  {name:"admin", password:"admin"}
];

function login(){
  let nameInput = document.getElementById("username").value.trim();
  let passInput = document.getElementById("password").value;
  let errorBox = document.getElementById("error");

  let userFound = users.find(u => u.name.toLowerCase() === nameInput.toLowerCase());

  // الاسم غير موجود
  if(!userFound){
    let closest = users.find(u => 
      u.name.toLowerCase().includes(nameInput.toLowerCase()) || 
      nameInput.toLowerCase().includes(u.name.toLowerCase())
    );

    errorBox.innerHTML = `
      ❌ الاسم غير موجود<br>
      💡 احذف المسافات من الاسم<br>
      ${closest ? `🔎 أقرب اسم: <b>${closest.name}</b>` : ""}
    `;
    return;
  }

  // كلمة السر غلط
  if(userFound.password !== passInput){
    errorBox.innerHTML = `
      ❌ كلمة السر ليست صحيحة<br>
      <a onclick="signupPage()">هل نسيت كلمة السر؟</a>
    `;
    return;
  }

  // نجاح
  errorBox.innerHTML = "";
  alert("تم تسجيل الدخول بنجاح ✅");
}

/* صفحة إنشاء حساب (مؤقتة) */
function signupPage(){
  alert("اذهب لصفحة إنشاء الحساب");
}
</script>

</body>
</html>
