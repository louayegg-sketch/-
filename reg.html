<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg, #12001a, #2a003f);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.box{
    background:#1a1a2e;
    padding:30px;
    border-radius:25px;
    width:320px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h2{
    color:white;
    text-shadow:0 0 10px rgba(255,255,255,0.8),
                 0 0 20px rgba(255,255,255,0.6);
}

/* الجملة */
.text{
    margin-top:20px;
    color:white;
    text-shadow:0 0 8px rgba(255,255,255,0.6);
    line-height:1.6;
}

/* الانستا */
.insta{
    margin-top:15px;
    color:#4fc3f7;
    text-shadow:0 0 8px #4fc3f7;
    font-weight:bold;
}

/* زر الرجوع */
button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:25%;
    background:#2ecc71;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#27ae60;
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="box">
    <h2>حساب جديد</h2>

    <div class="text">
        اذا بدك تسوي حساب جديد تواصل مع لؤي فالانستا يضبط وضعك
    </div>

    <div class="insta">
        @Louaye_gamer_i
    </div>

    <button onclick="goBack()">🔙 رجوع</button>
</div>

<script>
function goBack(){
    window.location.href = "login.html";
}
</script>

</body>
</html>
