<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0a192f; /* أزرق داكن */
    font-family: Arial;
}

.box {
    background: #112240;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    color: white;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 10px; /* حواف دائرية */
    outline: none;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 0px; /* مربع */
    background: #2196f3;
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

button:active {
    transform: scale(0.98);
}

#msg {
    margin-top: 12px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="box">
    <h2>تسجيل الدخول</h2>

    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">

    <button onclick="login()">دخول</button>

    <div id="msg"></div>
</div>

<script src="pass.js"></script>

<script>
function login(){

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    msg.style.color = "red";
    msg.innerText = "";

    if(!window.usersData){
        msg.innerText = "❌ خطأ في تحميل البيانات";
        return;
    }

    if(username === "" || password === ""){
        msg.innerText = "❌ الرجاء إدخال جميع البيانات";
        return;
    }

    if(!(username in usersData)){
        msg.innerText = "❌ الاسم غير موجود جرب حذف المسافات";
        return;
    }

    if(usersData[username] !== password){
        msg.innerText = "❌ كلمة السر غير صحيحة تحقق منها";
        return;
    }

    msg.style.color = "lightgreen";
    msg.innerText = "✅ تم تسجيل الدخول";

    localStorage.setItem("user", username);

    setTimeout(()=>{
        window.location.href = "home.html";
    }, 1000);
}
</script>

</body>
</html>
