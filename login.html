<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f2027;
    color: white;
}

.container {
    text-align: center;
}

input {
    display: block;
    margin: 10px auto;
    padding: 10px;
    width: 200px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #2196f3;
    color: white;
}

#msg {
    margin-top: 15px;
    color: red;
    white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">
    <h2>تسجيل الدخول</h2>

    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة السر">

    <button onclick="login()">دخول</button>

    <div id="msg"></div>
</div>

<script>
const users = [
    { username: "محمد", password: "1234" },
    { username: "أحمد", password: "1111" },
    { username: "لؤي", password: "2024" }
];

function normalize(text){
    return text.toLowerCase().replace(/\s+/g, "");
}

function findClosest(name){
    let names = users.map(u => u.username);
    let closest = names[0];
    let minDiff = 999;

    names.forEach(n => {
        let diff = Math.abs(n.length - name.length);
        if(diff < minDiff){
            minDiff = diff;
            closest = n;
        }
    });

    return closest;
}

function login(){

    let userInput = document.getElementById("username").value.trim();
    let passInput = document.getElementById("password").value.trim();
    let msg = document.getElementById("msg");

    msg.style.color = "red";
    msg.innerText = "";

    if(!userInput || !passInput){
        msg.innerText = "❌ في بيانات ناقصة";
        return;
    }

    let cleanInput = normalize(userInput);

    let foundUser = users.find(u => normalize(u.username) === cleanInput);

    // ❌ الاسم غير موجود
    if(!foundUser){
        let suggestion = findClosest(userInput);

        msg.innerText = "❌ الاسم غير موجود\nجرب حذف المسافات\nهل تقصد: " + suggestion;
        return;
    }

    // ❌ كلمة السر
    if(foundUser.password !== passInput){
        msg.innerText = "❌ كلمة السر غير صحيحة\nتحقق منها";
        return;
    }

    // ✅ نجاح
    msg.style.color = "green";
    msg.innerText = "✅ تم تسجيل الدخول بنجاح";

    localStorage.setItem("user", foundUser.username);

    setTimeout(() => {
        window.location.href = "home.html";
    }, 1000);
}
</script>

</body>
</html>
