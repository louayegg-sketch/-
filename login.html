<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0a1a2f; /* أزرق غامق ثابت */
    color: white;
}

.container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: rgba(0,0,0,0.5);
    padding: 30px;
    border-radius: 15px;
    width: 320px;
}

h2 {
    text-align: center;
}

input {
    padding: 12px;
    border: none;
    border-radius: 8px;
    outline: none;
    font-size: 16px;
}

button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #2196f3;
    color: white;
    cursor: pointer;
    font-size: 16px;
}

button:active {
    transform: scale(0.95);
}

.error {
    color: red;
    font-size: 14px;
    white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">
    <h2>تسجيل الدخول</h2>

    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">

    <button id="loginBtn">دخول</button>

    <div id="msg" class="error"></div>
</div>

<script>

const users = [
    { username: "admin", password: "1234" },
    { username: "louaye", password: "0000" },
    { username: "player1", password: "1111" }
];

function normalize(name){
    return name.toLowerCase().replace(/\s/g, "");
}

function findClosestName(input){
    let best = null;
    let bestScore = -1;

    users.forEach(u => {
        let a = normalize(u.username);
        let b = normalize(input);

        let score = 0;

        for(let i = 0; i < Math.min(a.length, b.length); i++){
            if(a[i] === b[i]) score++;
        }

        if(score > bestScore){
            bestScore = score;
            best = u.username;
        }
    });

    return best;
}

document.getElementById("loginBtn").addEventListener("click", function(){

    let userInput = document.getElementById("username").value;
    let passInput = document.getElementById("password").value;
    let msg = document.getElementById("msg");

    msg.innerText = "";

    if(userInput === "" || passInput === ""){
        msg.innerText = "❌ في بيانات ناقصة";
        return;
    }

    let cleanInput = normalize(userInput);

    let foundUser = users.find(u => normalize(u.username) === cleanInput);

    let suggestion = findClosestName(userInput);

    // ❌ الاسم غير موجود
    if(!foundUser){
        msg.innerText =
            "❌ الاسم غير موجود\n" +
            "جرب حذف المسافات\n" +
            (suggestion ? `هل تقصد: ${suggestion}` : "");
        return;
    }

    // ❌ كلمة السر غلط
    if(foundUser.password !== passInput){
        msg.innerText =
            "❌ كلمة السر غير صحيحة\n" +
            "تحقق منها";
        return;
    }

    // ✅ دخول ناجح
    localStorage.setItem("user", foundUser.username);
    window.location.href = "home.html";
});

</script>

</body>
</html>
