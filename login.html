<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #5f0a87);
    color: white;
}

.container {
    display: flex;
    flex-direction: column;
    gap: 15px;
    background: rgba(0,0,0,0.4);
    padding: 30px;
    border-radius: 15px;
    width: 320px;
}

h2 {
    text-align: center;
}

input {
    padding: 12px;
    border: none;
    border-radius: 8px;
    outline: none;
    font-size: 16px;
}

button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #2196f3;
    color: white;
    cursor: pointer;
    font-size: 16px;
    transition: 0.2s;
}

button:active {
    transform: scale(0.9);
}

button:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">
    <h2>تسجيل الدخول</h2>

    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">

    <button id="loginBtn">دخول</button>
</div>

<script>
// تأكد أن الزر مربوط صح
document.getElementById("loginBtn").addEventListener("click", function(){

    let user = document.getElementById("username").value.trim();
    let pass = document.getElementById("password").value.trim();

    if(user === "" || pass === ""){
        alert("املأ البيانات");
        return;
    }

    // مثال تسجيل دخول بسيط
    if(user === "admin" && pass === "1234"){
        localStorage.setItem("user", user);
        window.location.href = "home.html";
    } else {
        alert("بيانات خاطئة");
    }

});
</script>

</body>
</html>
