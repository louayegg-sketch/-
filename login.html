<script src="pass.js"></script>

<script>
function login(){

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    msg.innerText = "";

    // تأكد أن البيانات محملة
    if(typeof usersData === "undefined"){
        msg.style.color = "red";
        msg.innerText = "❌ خطأ: لم يتم تحميل الحسابات";
        return;
    }

    if(username === "" || password === ""){
        msg.style.color = "red";
        msg.innerText = "❌ الرجاء إدخال جميع البيانات";
        return;
    }

    if(!(username in usersData)){
        msg.style.color = "red";
        msg.innerText = "❌ الاسم غير موجود جرب حذف المسافات";
        return;
    }

    if(usersData[username] !== password){
        msg.style.color = "red";
        msg.innerText = "❌ كلمة السر غير صحيحة تحقق منها";
        return;
    }

    msg.style.color = "lightgreen";
    msg.innerText = "✅ تم تسجيل الدخول";

    localStorage.setItem("user", username);

    setTimeout(()=>{
        window.location.href = "home.html";
    }, 1000);
}
</script>
