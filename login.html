<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0a192f;
    font-family: Arial;
}

.box {
    background: #112240;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    color: white;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 12px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    background: #2196f3;
    color: white;
    cursor: pointer;
}

#msg {
    margin-top: 10px;
    color: red;
}
</style>
</head>

<body>

<div class="box">
    <h2>تسجيل الدخول</h2>

    <input id="username" placeholder="اسم المستخدم">
    <input id="password" type="password" placeholder="كلمة السر">

    <button onclick="login()">دخول</button>

    <div id="msg"></div>
</div>

<script>

// 🔥 بياناتك هنا مباشرة (مضمونة تشتغل)
const usersData = {
"لؤي":"36819",
"روسيا":"77701",
"محمد":"93516"
};

function login(){

    let u = document.getElementById("username").value.trim();
    let p = document.getElementById("password").value;
    let msg = document.getElementById("msg");

    msg.innerText = "";

    if(u === "" || p === ""){
        msg.innerText = "❌ اكتب كل المعلومات";
        return;
    }

    if(!(u in usersData)){
        msg.innerText = "❌ الاسم غير موجود";
        return;
    }

    if(usersData[u] !== p){
        msg.innerText = "❌ كلمة السر غير صحيحة";
        return;
    }

    msg.style.color = "lightgreen";
    msg.innerText = "✅ تم الدخول";

    setTimeout(()=>{
        window.location.href = "home.html";
    }, 1000);
}

</script>

</body>
</html>
