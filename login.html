/* LOGIN */
function login(){
    let user = document.getElementById("user").value.trim();
    let pass = document.getElementById("pass").value;
    let msg = document.getElementById("msg");

    msg.innerText="";

    if(accounts[user]){
        if(accounts[user].pass === pass){

            document.getElementById("loginPage").style.display="none";
            document.getElementById("mainPage").style.display="block";

            document.getElementById("welcome").innerText = "مرحباً " + user;

        } else {
            msg.innerText="كلمة السر غير صحيحة ❌";
        }
    } else {

        let closest = findClosest(user);

        msg.innerText =
        "الاسم غير موجود ❌\n" +
        "تأكد من حذف المسافات\n" +
        "أقرب اسم: " + closest;
    }
}

/* أقرب اسم */
function findClosest(input){
    let best="";
    let min=999;

    for(let name in accounts){
        let d = levenshtein(input,name);
        if(d<min){
            min=d;
            best=name;
        }
    }
    return best;
}

/* Levenshtein */
function levenshtein(a,b){
    let m=[];
    for(let i=0;i<=b.length;i++){m[i]=[i];}
    for(let j=0;j<=a.length;j++){m[0][j]=j;}

    for(let i=1;i<=b.length;i++){
        for(let j=1;j<=a.length;j++){
            if(b[i-1]==a[j-1]){
                m[i][j]=m[i-1][j-1];
            } else {
                m[i][j]=Math.min(
                    m[i-1][j-1]+1,
                    m[i][j-1]+1,
                    m[i-1][j]+1
                );
            }
        }
    }
    return m[b.length][a.length];
}
