<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #5f0a87);
    color: white;
}

.container {
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: rgba(0,0,0,0.4);
    padding: 20px;
    border-radius: 12px;
}

input {
    padding: 10px;
    border: none;
    border-radius: 8px;
    outline: none;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #2196f3;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:active {
    transform: scale(0.9);
}
</style>
</head>

<body>

<div class="container">
    <h2 id="title">تسجيل الدخول</h2>

    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">

    <button id="loginBtn">دخول</button>
</div>

<script>
// زر تسجيل الدخول
document.getElementById("loginBtn").onclick = function(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "" || pass === ""){
        alert("املأ البيانات");
        return;
    }

    // مثال بسيط (تقدر تربطه بملف users لاحقًا)
    if(user === "admin" && pass === "1234"){
        localStorage.setItem("user", user);
        window.location.href = "home.html";
    } else {
        alert("بيانات خاطئة");
    }
};
</script>

</body>
</html>
