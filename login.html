<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: #12001a;
    font-family: Arial;
}

/* المربع */
.box {
    background: linear-gradient(135deg, #0a192f, #1a0b2e);
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    color: white;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* الحقول */
input {
    width: 100%;
    padding: 14px;
    margin: 10px 0;

    border-radius: 18px;
    border: 2px solid black;

    outline: none;
    font-size: 14px;

    box-sizing: border-box;
    text-align: center;
}

/* زر الدخول */
button {
    width: 90px;
    height: 90px;

    border-radius: 25px;
    border: none;

    background: green;
    color: white;

    font-size: 14px;
    cursor: pointer;

    margin-top: 10px;
}

button:hover {
    background: #00aa00;
}

#msg {
    margin-top: 10px;
    color: red;
}
</style>
</head>

<body>

<div class="box">
<h2>تسجيل الدخول</h2>

<input id="username" placeholder="اسم المستخدم">
<input id="password" type="password" placeholder="كلمة السر">

<button onclick="login()">دخول</button>

<div id="msg"></div>
</div>

<script>

const usersData = {
"روسيا":"77701",
"لؤي":"36819",
"محمد":"93516"
};

function getClosestName(input){
    let closest = "";
    let min = Infinity;

    for(let name in usersData){
        let diff = Math.abs(name.length - input.length);
        if(diff < min){
            min = diff;
            closest = name;
        }
    }

    return closest;
}

function login(){

    let u = document.getElementById("username").value.trim();
    let p = document.getElementById("password").value;
    let msg = document.getElementById("msg");

    msg.innerText = "";

    if(!u || !p){
        msg.innerText = "❌ اكتب كل المعلومات";
        return;
    }

    if(!(u in usersData)){
        msg.innerText = "❌ الاسم غير موجود\nهل تقصد \"" + getClosestName(u) + "\"";
        return;
    }

    if(usersData[u] !== p){
        msg.innerText = "❌ كلمة السر غير صحيحة";
        return;
    }

    localStorage.setItem("user", u);
    window.location.href = "home.html";
}

</script>

</body>
</html>
