<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#12001a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#222;
    padding:20px;
    border-radius:15px;
    width:300px;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:8px;
    border-radius:8px;
    border:none;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:green;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:darkgreen;
    transform:scale(1.05);
}

.error{
    color:red;
    margin-top:10px;
    white-space:pre-line;
}
</style>
</head>

<body>

<div class="box">
    <h2>تسجيل الدخول</h2>

    <input id="username" placeholder="الاسم">
    <input id="password" type="password" placeholder="كلمة السر">

    <button onclick="login()">دخول</button>

    <div id="error" class="error"></div>
</div>

<script src="pass.js"></script>

<script>

function login(){

    let name = document.getElementById("username").value.trim();
    let pass = document.getElementById("password").value;
    let error = document.getElementById("error");

    error.innerText = "";

    // تحقق من الاسم
    if(passwords[name]){

        // تحقق من كلمة السر
        if(passwords[name] === pass){

            // نجاح
            window.location.href = "page.html?user=" + encodeURIComponent(name);

        } else {

            error.innerText = "كلمة السر غير صحيحة ❌";
        }

    } else {

        let closest = findClosest(name);

        error.innerText =
        "الاسم غير موجود ❌\n" +
        "تأكد من حذف المسافات\n" +
        "أقرب اسم: " + closest;
    }
}

// إيجاد أقرب اسم
function findClosest(input){

    let names = Object.keys(passwords);
    let best="";
    let min=999;

    for(let name of names){
        let d = levenshtein(input,name);
        if(d < min){
            min = d;
            best = name;
        }
    }

    return best;
}

// حساب الفرق بين الكلمات
function levenshtein(a,b){
    let m=[];
    for(let i=0;i<=b.length;i++){m[i]=[i];}
    for(let j=0;j<=a.length;j++){m[0][j]=j;}

    for(let i=1;i<=b.length;i++){
        for(let j=1;j<=a.length;j++){
            if(b[i-1]==a[j-1]){
                m[i][j]=m[i-1][j-1];
            } else {
                m[i][j]=Math.min(
                    m[i-1][j-1]+1,
                    m[i][j-1]+1,
                    m[i-1][j]+1
                );
            }
        }
    }
    return m[b.length][a.length];
}

</script>

</body>
</html>
