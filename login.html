<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>
<body>

<h2>تسجيل الدخول</h2>

<input id="username" placeholder="اسم المستخدم">
<br><br>
<input id="password" placeholder="كلمة المرور" type="password">
<br><br>

<button onclick="login()">دخول</button>

<script src="users.js"></script>

<script>

function getSimilarName(input, usersObj){
    let names = Object.keys(usersObj);
    let bestMatch = null;
    let bestScore = 0;

    names.forEach(name => {
        let score = similarity(input, name);
        if(score > bestScore){
            bestScore = score;
            bestMatch = name;
        }
    });

    return { name: bestMatch, score: bestScore };
}

function similarity(a, b){
    let longer = a.length > b.length ? a : b;
    let shorter = a.length > b.length ? b : a;

    let matches = 0;

    for(let i = 0; i < shorter.length; i++){
        if(longer[i] === shorter[i]){
            matches++;
        }
    }

    return matches / longer.length;
}

function login(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(users[username] && users[username].pass === password){
        localStorage.setItem("user", username);
        window.location.href = "home.html";
    } else {
        let result = getSimilarName(username, users);

        if(result.score > 0.4){
            alert("❌ الاسم غير صحيح\nهل تقصد: " + result.name);
        } else {
            alert("❌ الحساب غير موجود");
        }
    }
}

</script>

</body>
</html>
