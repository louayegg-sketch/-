<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #12001a, #3a0ca3);
        color: white;
    }

    .box {
        background: rgba(0,0,0,0.4);
        padding: 25px;
        border-radius: 15px;
        text-align: center;
        width: 300px;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 10px;
        border: none;
        outline: none;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 12px;
        background: #2196f3;
        color: white;
        cursor: pointer;
        transition: 0.2s;
    }

    button:active {
        transform: scale(0.9);
    }

    .error {
        color: red;
        margin-top: 10px;
        font-size: 14px;
        white-space: pre-line;
    }

    .popup {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        display: none;
        justify-content: center;
        align-items: center;
    }

    .card {
        background: #1e1e2f;
        padding: 20px;
        border-radius: 15px;
        width: 320px;
        text-align: right;
        animation: zoom 0.3s ease;
    }

    @keyframes zoom {
        from {transform: scale(0.5);}
        to {transform: scale(1);}
    }

    .close {
        margin-top: 10px;
        background: red;
        border-radius: 10px;
    }
</style>

</head>
<body>

<div class="box">
    <h2>تسجيل الدخول</h2>

    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور">

    <button onclick="login()">دخول</button>

    <div id="msg" class="error"></div>
</div>

    <div class="card">

</div>

const names = Object.keys(accounts);

function levenshtein(a, b){
    let matrix = [];
    for(let i=0;i<=b.length;i++){ matrix[i]=[i]; }
    for(let j=0;j<=a.length;j++){ matrix[0][j]=j; }

    for(let i=1;i<=b.length;i++){
        for(let j=1;j<=a.length;j++){
            if(b[i-1]==a[j-1]){
                matrix[i][j]=matrix[i-1][j-1];
            } else {
                matrix[i][j]=Math.min(
                    matrix[i-1][j-1]+1,
                    matrix[i][j-1]+1,
                    matrix[i-1][j]+1
                );
            }
        }
    }
    return matrix[b.length][a.length];
}

function closestName(input){
    let best="", min=999;
    names.forEach(n=>{
        let d = levenshtein(input,n);
        if(d < min){
            min = d;
            best = n;
        }
    });
    return best;
}

function login(){
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;
    let msg = document.getElementById("msg");

    msg.innerText = "";

    if(accounts[user]){
        if(accounts[user].pass === pass){
            document.getElementById("name").innerText = user;
            document.getElementById("info").innerHTML = accounts[user].info;
            document.getElementById("popup").style.display = "flex";
        } else {
            msg.innerText = "كلمة السر غير صحيحة ❌";
        }
    } else {
        let closest = closestName(user);
        msg.innerText = "الاسم غير موجود ❌\nهل تقصد: " + closest + " ؟";
    }
}

function closePopup(){
