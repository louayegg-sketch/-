<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg, #12001a, #2a003f);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:#1e1e1e;
    padding:25px;
    border-radius:15px;
    width:300px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:orange;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#ffb84d;
}

.suggestion{
    color:#aaa;
    font-size:12px;
    margin-top:-5px;
}
</style>
</head>

<body>

<div class="box">
    <h2>تسجيل الدخول</h2>

    <input id="username" placeholder="اسم المستخدم" oninput="checkName()">
    <div id="suggest" class="suggestion"></div>

    <input id="password" type="password" placeholder="كلمة المرور">

    <button onclick="login()">دخول</button>
</div>

<script src="users.js"></script>

<script>

function similarity(a,b){
    let longer = a.length > b.length ? a : b;
    let shorter = a.length > b.length ? b : a;

    let matches = 0;

    for(let i=0;i<shorter.length;i++){
        if(longer[i] === shorter[i]){
            matches++;
        }
    }

    return matches / longer.length;
}

function findClosest(input){
    let best = null;
    let score = 0;

    for(let name in users){
        let s = similarity(input, name);
        if(s > score){
            score = s;
            best = name;
        }
    }

    return {best, score};
}

// اقتراح مباشر تحت الخانة
function checkName(){
    let input = document.getElementById("username").value;
    let res = findClosest(input);

    let suggestBox = document.getElementById("suggest");

    if(res.score > 0.4){
        suggestBox.innerText = "هل تقصد: " + res.best;
    } else {
        suggestBox.innerText = "";
    }
}

function login(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(users[username] && users[username].pass === password){

        localStorage.setItem("user", username);
        window.location.href = "home.html";

    } else {
        alert("❌ اسم المستخدم أو كلمة المرور غير صحيحة");
    }
}

</script>

</body>
</html>
