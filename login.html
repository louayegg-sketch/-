<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0a192f;
    font-family: Arial;
}

.box {
    background: #112240;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    color: white;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 12px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    background: #2196f3;
    color: white;
    cursor: pointer;
}

#msg {
    margin-top: 10px;
    color: red;
    white-space: pre-line;
}
</style>
</head>

<body>

<div class="box">
    <h2>تسجيل الدخول</h2>

    <input id="username" placeholder="اسم المستخدم">
    <input id="password" type="password" placeholder="كلمة السر">

    <button onclick="login()">دخول</button>

    <div id="msg"></div>
</div>

<script>

// بياناتك
const usersData = {
"لؤي":"36819",
"روسيا":"77701",
"محمد":"93516",
"احمد":"55073",
"عمر":"74219"
};

// إيجاد أقرب اسم
function getClosestName(input){
    let closest = "";
    let minDiff = Infinity;

    for(let name in usersData){
        let diff = Math.abs(name.length - input.length);
        if(diff < minDiff){
            minDiff = diff;
            closest = name;
        }
    }

    return closest;
}

function login(){

    let u = document.getElementById("username").value.trim();
    let p = document.getElementById("password").value;
    let msg = document.getElementById("msg");

    msg.innerText = "";

    if(u === "" || p === ""){
        msg.innerText = "❌ اكتب كل المعلومات";
        return;
    }

    // ❌ اسم غلط
    if(!(u in usersData)){
        let suggestion = getClosestName(u);

        msg.innerText =
            "❌ الاسم غير موجود\n" +
            "هل تقصد \"" + suggestion + "\"";

        return;
    }

    // ❌ كلمة السر غلط
    if(usersData[u] !== p){
        msg.innerText = "❌ كلمة السر غير صحيحة";
        return;
    }

    // ✅ دخول مباشر بدون رسالة
    localStorage.setItem("user", u);
    window.location.href = "home.html";
}

</script>

</body>
</html>
