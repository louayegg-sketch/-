<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg, #12001a, #2a003f);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:#1a1a2e;
    padding:30px;
    border-radius:25px;
    width:320px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,0,0,0.6);
}

/* العنوان */
h2{
    color:white;
    text-shadow:0 0 10px rgba(255,255,255,0.8),
                 0 0 20px rgba(255,255,255,0.6);
}

/* الحقول */
input{
    width:95%;
    padding:12px;
    margin:12px 0;
    border-radius:12px;
    border:2px solid transparent;
    outline:none;
    transition:0.3s;
    background:#111;
    color:white;
}

/* تأثير عند التركيز */
input:focus{
    border:2px solid #4cafef;
    box-shadow:0 0 8px #4cafef;
}

/* زر الدخول */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:35%;
    background:#2ecc71;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#27ae60;
    transform:scale(1.05);
}

/* الاقتراح */
.suggestion{
    font-size:13px;
    color:#aaa;
    margin-top:-5px;
}

/* الخطأ */
.error{
    color:red;
    font-size:14px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
    <h2>تسجيل الدخول</h2>

    <input id="username" placeholder="اسم المستخدم" oninput="checkName()">
    <div id="suggest" class="suggestion"></div>

    <input id="password" type="password" placeholder="كلمة المرور">

    <button onclick="login()">دخول</button>

    <div id="error" class="error"></div>
</div>

<script src="users.js"></script>

<script>

function similarity(a,b){
    let longer = a.length > b.length ? a : b;
    let shorter = a.length > b.length ? b : a;

    let matches = 0;

    for(let i=0;i<shorter.length;i++){
        if(longer[i] === shorter[i]){
            matches++;
        }
    }

    return matches / longer.length;
}

function findClosest(input){
    let best = null;
    let score = 0;

    for(let name in users){
        let s = similarity(input, name);
        if(s > score){
            score = s;
            best = name;
        }
    }

    return {best, score};
}

// عرض الاقتراح
function checkName(){
    let input = document.getElementById("username").value;
    let res = findClosest(input);

    let suggestBox = document.getElementById("suggest");

    if(res.score > 0.4){
        suggestBox.innerText = "هل تقصد: " + res.best;
    } else {
        suggestBox.innerText = "";
    }
}

// تسجيل الدخول
function login(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let errorBox = document.getElementById("error");

    if(users[username] && users[username].pass === password){

        localStorage.setItem("user", username);
        window.location.href = "home.html";

    } else {

        let res = findClosest(username);

        if(res.score > 0.4){
            errorBox.innerText = "❌ خطأ! هل تقصد: " + res.best;
        } else {
            errorBox.innerText = "❌ اسم المستخدم أو كلمة المرور غير صحيحة";
        }

    }
}

</script>

</body>
</html>
