<script src="pass.js"></script>

<script>

function normalize(text){
    return text.toLowerCase().replace(/\s+/g, "");
}

function findClosest(input){
    let closest = "";
    let minDiff = Infinity;

    for(let name in usersData){
        let diff = Math.abs(name.length - input.length);
        if(diff < minDiff){
            minDiff = diff;
            closest = name;
        }
    }

    return closest;
}

function login(){

    let userInput = document.getElementById("username").value.trim();
    let passInput = document.getElementById("password").value.trim();
    let msg = document.getElementById("msg");

    msg.innerText = "";

    if(!userInput || !passInput){
        msg.innerText = "❌ في بيانات ناقصة";
        return;
    }

    let cleanInput = normalize(userInput);

    let foundName = null;

    for(let name in usersData){
        if(normalize(name) === cleanInput){
            foundName = name;
            break;
        }
    }

    if(!foundName){
        let suggestion = findClosest(userInput);

        msg.innerText =
            "❌ الاسم غير موجود\n" +
            "جرب حذف المسافات\n" +
            "هل تقصد: " + suggestion;

        return;
    }

    if(usersData[foundName] !== passInput){
        msg.innerText =
            "❌ كلمة السر غير صحيحة\n" +
            "تحقق منها";
        return;
    }

    // نجاح
    localStorage.setItem("user", foundName);
    window.location.href = "home.html";
}

</script>
