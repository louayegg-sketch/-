<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f0c29, #3a0ca3, #7209b7);
    color: white;
}

.container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: rgba(0,0,0,0.4);
    padding: 30px;
    border-radius: 15px;
    width: 320px;
}

h2 {
    text-align: center;
}

input {
    padding: 12px;
    border: none;
    border-radius: 8px;
    outline: none;
    font-size: 16px;
}

button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #2196f3;
    color: white;
    cursor: pointer;
    font-size: 16px;
}

button:active {
    transform: scale(0.95);
}

.error {
    color: red;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
    <h2>تسجيل الدخول</h2>

    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">

    <button id="loginBtn">دخول</button>

    <div id="msg" class="error"></div>
</div>

<script>
// 👇 قائمة المستخدمين (مثال)
const users = [
    { username: "admin", password: "1234" },
    { username: "louaye", password: "0000" },
    { username: "player1", password: "1111" }
];

function findClosestName(inputName){
    inputName = inputName.toLowerCase();
    let bestMatch = null;
    let minDiff = Infinity;

    users.forEach(u => {
        let name = u.username.toLowerCase();

        // حساب الفرق البسيط
        let diff = Math.abs(name.length - inputName.length);

        if(name.includes(inputName) || inputName.includes(name)){
            diff = 0;
        }

        if(diff < minDiff){
            minDiff = diff;
            bestMatch = u.username;
        }
    });

    return bestMatch;
}

document.getElementById("loginBtn").addEventListener("click", function(){

    let userInput = document.getElementById("username").value;
    let passInput = document.getElementById("password").value;
    let msg = document.getElementById("msg");

    msg.innerText = "";

    if(userInput === "" || passInput === ""){
        msg.innerText = "املأ البيانات";
        return;
    }

    let cleanInput = userInput.replace(/\s/g, "");

    let foundUser = users.find(u => u.username === cleanInput);

    // ❌ الاسم غير موجود
    if(!foundUser){
        let suggestion = findClosestName(cleanInput);

        msg.innerText = "❌ الاسم غير موجود\nجرب بدون مسافات: " + cleanInput;

        if(suggestion){
            msg.innerText += "\nهل تقصد: " + suggestion + "؟";
        }

        return;
    }

    // ❌ كلمة السر غلط
    if(foundUser.password !== passInput){
        msg.innerText = "❌ كلمة السر غير صحيحة";
        return;
    }

    // ✅ نجاح
    localStorage.setItem("user", foundUser.username);
    window.location.href = "home.html";
});
</script>

</body>
</html>
