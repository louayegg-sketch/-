<script src="pass.js"></script>

<script>

function normalize(text){
    return text.trim().replace(/\s+/g, " ");
}

function findClosest(input){
    let closest = "";
    let min = Infinity;

    for(let name in usersData){
        let diff = Math.abs(name.length - input.length);
        if(diff < min){
            min = diff;
            closest = name;
        }
    }

    return closest;
}

function login(){

    let username = normalize(document.getElementById("username").value);
    let password = document.getElementById("password").value;
    let msg = document.getElementById("msg");

    msg.style.color = "red";

    if(username === "" || password === ""){
        msg.innerText = "❌ الرجاء ملء جميع الحقول";
        return;
    }

    let foundName = null;

    // مقارنة بدون مشاكل مسافات
    for(let name in usersData){
        if(name.trim() === username){
            foundName = name;
            break;
        }
    }

    if(!foundName){
        let suggestion = findClosest(username);

        msg.innerText =
            "❌ الاسم غير موجود\n" +
            "جرب حذف المسافات\n" +
            "هل تقصد: " + suggestion;

        return;
    }

    if(usersData[foundName] !== password){
        msg.innerText = "❌ كلمة السر غير صحيحة تحقق منها";
        return;
    }

    // نجاح
    msg.style.color = "green";
    msg.innerText = "✅ تم تسجيل الدخول";

    localStorage.setItem("user", foundName);

    setTimeout(()=>{
        window.location.href = "home.html";
    }, 1000);
}

</script>
