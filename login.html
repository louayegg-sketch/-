<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1a0025, #3a0ca3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.box {
    background: rgba(0,0,0,0.5);
    padding: 25px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: green;
    color: white;
    cursor: pointer;
}

button:active {
    transform: scale(0.9);
}

.error {
    color: red;
    margin-top: 10px;
    white-space: pre-line;
}

.popup {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.card {
    background: #222;
    padding: 20px;
    border-radius: 12px;
    width: 340px;
    text-align: right;
}

.close {
    margin-top: 10px;
    background: red;
}
</style>

</head>

<body>

<div class="box">
    <h2>تسجيل الدخول</h2>
    <input id="user" placeholder="الاسم">
    <input id="pass" type="password" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
    <div id="msg" class="error"></div>
</div>

<div class="popup" id="popup">
    <div class="card">
        <h3 id="name"></h3>
        <div id="info"></div>
        <button class="close" onclick="closePopup()">إغلاق</button>

</div>

function login(){
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;
    let msg = document.getElementById("msg");

    msg.innerText = "";

    if(accounts[user]){
        if(accounts[user].pass === pass){

            let u = accounts[user];

            document.getElementById("name").innerText = user;

            let extraText = u.extra ? `<br>📌 ${u.extra}` : "";

            document.getElementById("info").innerHTML = `
            👥 الجنود: ${u.soldiers}<br>
            💰 الاقتصاد: ${u.money}<br>
            🪖 العسكري: ${u.military}<br>
            🏆 المنتخب: ${u.team}
            ${extraText}
            `;

            document.getElementById("popup").style.display = "flex";

        } else {
            msg.innerText = "كلمة السر غير صحيحة ❌";
        }
    } else {
        msg.innerText = "الاسم غير موجود ❌";
    }
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}
