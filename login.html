<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body style="background:#12001a;color:white;text-align:center;font-family:Arial;">

<h2>تسجيل الدخول</h2>

<input id="username" placeholder="اسم المستخدم"><br><br>
<input id="password" type="password" placeholder="كلمة المرور"><br><br>

<button onclick="login()">دخول</button>

<script src="users.js"></script>

<script>

function similarity(a,b){
    let longer = a.length > b.length ? a : b;
    let shorter = a.length > b.length ? b : a;

    let matches = 0;

    for(let i=0;i<shorter.length;i++){
        if(longer[i] === shorter[i]){
            matches++;
        }
    }

    return matches / longer.length;
}

function findClosest(input){
    let best = null;
    let score = 0;

    for(let name in users){
        let s = similarity(input, name);
        if(s > score){
            score = s;
            best = name;
        }
    }

    return {best, score};
}

function login(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(users[username] && users[username].pass === password){

        localStorage.setItem("user", username);
        window.location.href = "home.html";

    } else {

        let res = findClosest(username);

        if(res.score > 0.4){
            alert("❌ الحساب غير صحيح\nهل تقصد: " + res.best);
        } else {
            alert("❌ الحساب غير موجود");
        }

    }
}

</script>

</body>
</html>
