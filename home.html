<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#12001a;
    color:white;
}

/* الهيدر */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
}

/* الصورة */
.avatar{
    width:50px;
    height:50px;
    border-radius:50%;
    object-fit:cover;
    background:#555;
    cursor:pointer;
    transition:0.3s;
}

.avatar:hover{
    transform:scale(1.1);
}

/* القائمة */
.sidebar{
    position:fixed;
    top:0;
    right:-300px;
    width:260px;
    height:100%;
    background:#222;
    padding:20px;
    transition:0.4s;
    box-shadow:-5px 0 15px rgba(0,0,0,0.5);
}

.sidebar.active{
    right:0;
}

/* زر */
button{
    margin-top:20px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:red;
    color:white;
    cursor:pointer;
}

/* محتوى */
.card{
    text-align:center;
    margin-top:40px;
}
</style>
</head>

<body>

<div class="header">
    <h3 id="welcome"></h3>

    <label>
        <img id="avatar" class="avatar" onclick="toggleMenu()">
        <input type="file" accept="image/*" id="fileInput" hidden onchange="changeImage(event)">
    </label>
</div>

<div class="card">
    <p>اضغط على الصورة لفتح القائمة 👆</p>
</div>

<!-- القائمة -->
<div class="sidebar" id="sidebar">
    <h3>معلومات الحساب</h3>

    <p id="userName"></p>
    <p id="soldiers"></p>
    <p id="money"></p>
    <p id="military"></p>
    <p id="team"></p>

    <hr>

    <button onclick="logout()">تسجيل خروج</button>
</div>

<script src="users.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const user = params.get("user");

if(!user || !users[user]){
    window.location.href = "login.html";
}

// ترحيب
document.getElementById("welcome").innerText = "مرحبا بك يا " + user;

// بيانات المستخدم
let data = users[user];

// عرض المعلومات
document.getElementById("userName").innerText = "👤 الاسم: " + user;
document.getElementById("soldiers").innerText = "👥 الجنود: " + data.soldiers;
document.getElementById("money").innerText = "💰 الفلوس: " + data.money;
document.getElementById("military").innerText = "🪖 العسكري: " + data.military;
document.getElementById("team").innerText = "🏆 المنتخب: " + data.team;

// تحميل الصورة المحفوظة
let savedImage = localStorage.getItem("avatar_" + user);
if(savedImage){
    document.getElementById("avatar").src = savedImage;
}

// فتح/إغلاق القائمة
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
}

// تغيير الصورة
function changeImage(event){
    let file = event.target.files[0];
    if(file){
        let reader = new FileReader();
        reader.onload = function(e){
            let imgData = e.target.result;
            document.getElementById("avatar").src = imgData;

            localStorage.setItem("avatar_" + user, imgData);
        }
        reader.readAsDataURL(file);
    }
}

// إغلاق القائمة عند الضغط خارجها
document.addEventListener("click", function(e){

    let sidebar = document.getElementById("sidebar");
    let avatar = document.getElementById("avatar");

    if(sidebar.classList.contains("active")){

        if(!sidebar.contains(e.target) && !avatar.contains(e.target)){
            sidebar.classList.remove("active");
        }
    }

});

// تسجيل خروج
function logout(){
    window.location.href = "login.html";
}

</script>

</body>
</html>
