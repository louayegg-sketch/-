<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#12001a;
    color:white;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
}

.avatar{
    width:50px;
    height:50px;
    border-radius:50%;
    object-fit:cover;
    background:#555;
    cursor:pointer;
    transition:0.3s;
}

.avatar:hover{
    transform:scale(1.1);
}

.sidebar{
    position:fixed;
    top:0;
    right:-300px;
    width:260px;
    height:100%;
    background:#222;
    padding:20px;
    transition:0.4s;
}

.sidebar.active{
    right:0;
}

button{
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#444;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#666;
}

.card{
    text-align:center;
    margin-top:40px;
}

/* نافذة تعديل الصورة */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#222;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

canvas{
    border:1px solid white;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
    <h3 id="welcome"></h3>
    <img id="avatar" class="avatar" onclick="toggleMenu()">
</div>

<div class="card">
    <p>اضغط على الصورة لفتح القائمة 👆</p>
</div>

<!-- القائمة -->
<div class="sidebar" id="sidebar">
    <h3>معلومات الحساب</h3>

    <p id="userName"></p>
    <p id="soldiers"></p>
    <p id="money"></p>
    <p id="military"></p>
    <p id="team"></p>

    <hr>

    <button onclick="openEditor()">تغيير الصورة</button>
    <button onclick="logout()">تسجيل خروج</button>
</div>

<!-- نافذة تعديل الصورة -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3>تعديل الصورة</h3>

        <input type="file" id="fileInput" accept="image/*">

        <br>

        <canvas id="canvas" width="200" height="200"></canvas>

        <br>

        <button onclick="saveImage()">حفظ</button>
        <button onclick="closeModal()">إلغاء</button>
    </div>
</div>

<script src="users.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const user = params.get("user");

if(!user || !users[user]){
    window.location.href = "login.html";
}

// عرض الاسم
document.getElementById("welcome").innerText = "مرحبا بك يا " + user;

// بيانات المستخدم
let data = users[user];

// عرض المعلومات
document.getElementById("userName").innerText = "👤 الاسم: " + user;
document.getElementById("soldiers").innerText = "👥 الجنود: " + data.soldiers;
document.getElementById("money").innerText = "💰 الفلوس: " + data.money;
document.getElementById("military").innerText = "🪖 العسكري: " + data.military;
document.getElementById("team").innerText = "🏆 المنتخب: " + data.team;

// تحميل الصورة المحفوظة
let savedImage = localStorage.getItem("avatar_" + user);
if(savedImage){
    document.getElementById("avatar").src = savedImage;
}

// القائمة
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
}

// فتح نافذة تعديل الصورة
function openEditor(){
    document.getElementById("modal").style.display = "flex";
}

// إغلاق النافذة
function closeModal(){
    document.getElementById("modal").style.display = "none";
}

// رسم الصورة داخل canvas
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let img = new Image();

document.getElementById("fileInput").onchange = function(e){
    let file = e.target.files[0];
    if(file){
        let reader = new FileReader();
        reader.onload = function(event){
            img.onload = function(){
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.drawImage(img,0,0,canvas.width,canvas.height);
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    }
}

// حفظ الصورة
function saveImage(){
    let dataURL = canvas.toDataURL("image/png");

    document.getElementById("avatar").src = dataURL;

    localStorage.setItem("avatar_" + user, dataURL);

    closeModal();
}

// إغلاق القائمة عند الضغط خارجها
document.addEventListener("click", function(e){

    let sidebar = document.getElementById("sidebar");
    let avatar = document.getElementById("avatar");

    if(sidebar.classList.contains("active")){

        if(!sidebar.contains(e.target) && !avatar.contains(e.target)){
            sidebar.classList.remove("active");
        }
    }

});

// تسجيل خروج
function logout(){
    window.location.href = "login.html";
}

</script>
<script src="lang.js"></script>
</body>
</html>
