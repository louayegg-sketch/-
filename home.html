<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#12001a;
    color:white;
}

.header{
    display:flex;
    justify-content:space-between;
    padding:15px;
}

.avatar{
    width:50px;
    height:50px;
    border-radius:50%;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <h3 id="welcome"></h3>
    <img id="avatar" class="avatar">
</div>

<script>

// 🔥 أهم سطر (الحل)
let user = localStorage.getItem("user");

if(!user){
    window.location.href = "login.html";
}

// عرض الاسم
document.getElementById("welcome").innerText = "مرحبا بك يا " + user;

// صورة
let img = localStorage.getItem("avatar_"+user);
if(img){
    document.getElementById("avatar").src = img;
}

// تسجيل خروج
function logout(){
    localStorage.removeItem("user");
    window.location.href = "login.html";
}

</script>

</body>
</html>
