<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#12001a;
    color:white;
}

.header{
    display:flex;
    justify-content:space-between;
    padding:15px;
}

.avatar{
    width:50px;
    height:50px;
    border-radius:50%;
    cursor:pointer;
}

.sidebar{
    position:fixed;
    top:0;
    right:-300px;
    width:260px;
    height:100%;
    background:#222;
    padding:20px;
    transition:0.4s;
}

.sidebar.active{
    right:0;
}

button{
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#444;
    color:white;
    width:100%;
    cursor:pointer;
}

button:hover{
    background:#666;
}

.shop-btn{
    background:orange;
    color:black;
}
</style>
</head>

<body>

<div class="header">
    <h3 id="welcome"></h3>
    <img id="avatar" class="avatar" onclick="toggleMenu()">
</div>

<div style="padding:20px;">
    <button class="shop-btn" onclick="goShop()">🛒 المتجر</button>
</div>

<div class="sidebar" id="sidebar">
    <h3>الحساب</h3>
    <p id="info"></p>
    <button onclick="logout()">تسجيل خروج</button>
</div>

<script src="users.js"></script>

<script>

let user = localStorage.getItem("user");

if(!user){
    window.location.href = "login.html";
}

let data = users[user];

document.getElementById("welcome").innerText = "مرحبا " + user;

document.getElementById("info").innerHTML =
"👤 الاسم: " + user + "<br>" +
"👥 الجنود: " + data.soldiers + "<br>" +
"💰 المال: " + data.money + "<br>" +
"🪖 العسكري: " + data.military + "<br>" +
"🏆 الفريق: " + data.team;

function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
}

function logout(){
    localStorage.removeItem("user");
    window.location.href = "login.html";
}

function goShop(){
    window.location.href = "shop.html";
}

</script>

</body>
</html>
