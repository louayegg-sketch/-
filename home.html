<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#12001a;
    color:white;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
}

.avatar{
    width:50px;
    height:50px;
    border-radius:50%;
    object-fit:cover;
    cursor:pointer;
}

.settings-btn{
    font-size:22px;
    background:none;
    border:none;
    color:white;
    cursor:pointer;
}

/* لوحة الإعدادات */
.settings-panel{
    position:fixed;
    top:0;
    right:-300px;
    width:250px;
    height:100%;
    background:#222;
    padding:20px;
    transition:0.4s;
}

.settings-panel.active{
    right:0;
}

.settings-panel button{
    display:block;
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#444;
    color:white;
}

.settings-panel button:hover{
    background:#666;
}

.logout-btn{
    background:red !important;
}
</style>
</head>

<body>

<div class="header">
    <h3 id="welcome"></h3>

    <div>
        <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
        <img id="avatar" class="avatar">
    </div>
</div>

<div style="padding:20px;">
    <p>مرحبًا 👋</p>
</div>

<!-- لوحة الإعدادات -->
<div id="settingsPanel" class="settings-panel">
    <h3>الإعدادات</h3>

    <button onclick="changeLang()">🌐 تغيير اللغة</button>
    <button onclick="changeImage()">🖼️ تغيير الصورة</button>
    <button class="logout-btn" onclick="logout()">🚪 تسجيل خروج</button>
</div>

<script src="users.js"></script>

<script>

// جلب المستخدم
let user = localStorage.getItem("user");

if(!user){
    window.location.href = "login.html";
}

// عرض الاسم
document.getElementById("welcome").innerText = "مرحبا بك يا " + user;

// صورة المستخدم
let img = localStorage.getItem("avatar_" + user);
if(img){
    document.getElementById("avatar").src = img;
}

// فتح/غلق الإعدادات
function toggleSettings(){
    document.getElementById("settingsPanel").classList.toggle("active");
}

// تغيير اللغة (تجريبي)
function changeLang(){
    alert("تغيير اللغة تحت الإنشاء");
}

// تغيير الصورة
function changeImage(){
    let input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";

    input.onchange = function(e){
        let file = e.target.files[0];
        let reader = new FileReader();

        reader.onload = function(event){
            let data = event.target.result;
            document.getElementById("avatar").src = data;
            localStorage.setItem("avatar_" + user, data);
        }

        reader.readAsDataURL(file);
    }

    input.click();
}

// تسجيل خروج
function logout(){
    localStorage.removeItem("user");
    window.location.href = "login.html";
}

</script>

</body>
</html>
